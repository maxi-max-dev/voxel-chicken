<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐔 老鹰抓小鸡 · 方块版</title>
<style>
  /* ===== 全局：去边距、禁止滚动、像素硬朗风 ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #87CEEB; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
  }
  #game-canvas { display: block; width: 100vw; height: 100vh; }

  /* ===== HUD：半透明圆角深底白字 ===== */
  .hud {
    position: fixed; z-index: 10; color: #fff;
    background: rgba(20, 24, 30, 0.55);
    border-radius: 10px; padding: 8px 12px;
    font-size: 14px; line-height: 1.4;
    backdrop-filter: blur(3px); pointer-events: none;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }
  #hud-hint { bottom: 12px; right: 12px; font-size: 12px; opacity: 0.85; pointer-events: auto; cursor: pointer; }
  /* 当前视角模式小字（右上角，避让调参齿轮提示） */
  #hud-cam { top: 12px; right: 12px; font-size: 12px; opacity: 0.85; pointer-events: auto; cursor: pointer; }
  #hud-cam .mode { color: #ffd166; font-weight: 700; }

  /* ===== 顶中：倒计时 + 抓捕数 ===== */
  #hud-top {
    top: 12px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 18px; align-items: center; font-size: 16px;
  }
  #hud-top .timer { font-weight: 700; font-size: 22px; color: #fff; font-variant-numeric: tabular-nums; }
  #hud-top .timer.urgent { color: #ff5a5a; }
  #hud-top .score { font-weight: 700; }
  #hud-top .score .num { font-size: 22px; color: #ffd166; }
  /* 状态图标（致盲/携带等），在倒计时下方 */
  #hud-status {
    top: 52px; left: 50%; transform: translateX(-50%);
    display: none; gap: 10px; font-size: 13px; padding: 5px 10px;
  }
  #hud-status.show { display: flex; }

  /* ===== 底中：技能提示 + 冷却进度 ===== */
  #hud-skill {
    bottom: 14px; left: 50%; transform: translateX(-50%);
    padding: 0; background: none; backdrop-filter: none; text-align: center;
  }
  #hud-skill .skill-btn {
    position: relative; display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
    min-width: 96px; padding: 8px 16px; border-radius: 12px;
    background: rgba(20,24,30,0.6); backdrop-filter: blur(3px);
    overflow: hidden; transition: opacity 0.15s;
  }
  #hud-skill .skill-name { font-weight: 700; font-size: 15px; position: relative; z-index: 2; }
  #hud-skill .skill-sub  { font-size: 11px; opacity: 0.8; position: relative; z-index: 2; }
  /* 冷却灰罩：从底部按比例升起 */
  #hud-skill .cd-fill {
    position: absolute; left: 0; bottom: 0; width: 100%; height: 0%;
    background: rgba(0,0,0,0.55); z-index: 1; transition: none;
  }
  #hud-skill .skill-btn.ready .skill-name { color: #8fe388; }
  #hud-skill .skill-btn.active .skill-name { color: #ffd166; }

  /* ===== 屏幕边缘威胁指示（老鹰在视野外时的红色三角） ===== */
  #threat-arrow {
    position: fixed; z-index: 15; left: 0; top: 0;
    width: 0; height: 0;
    border-left: 13px solid transparent; border-right: 13px solid transparent;
    border-bottom: 22px solid #ff3b3b;
    filter: drop-shadow(0 0 4px rgba(255,40,40,0.7));
    opacity: 0; transition: opacity 0.25s; pointer-events: none;
    transform-origin: 50% 50%;
  }

  /* ===== Toast 提示 ===== */
  #toast {
    position: fixed; z-index: 30; left: 50%; top: 18%; transform: translateX(-50%);
    background: rgba(30, 20, 10, 0.85); color: #ffe;
    padding: 10px 18px; border-radius: 12px; font-size: 15px; font-weight: 600;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    /* 窄屏(<360px)换行而非溢出：限宽 + 允许换行，居中文本 */
    white-space: normal; max-width: calc(100vw - 24px); text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  #toast.show { opacity: 1; }

  /* ===== 开局覆盖层 ===== */
  #overlay {
    position: fixed; z-index: 50; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, rgba(20,30,45,0.55), rgba(10,15,25,0.78));
    color: #fff; text-align: center; transition: opacity 0.6s; padding: 20px;
  }
  #overlay.hide { opacity: 0; pointer-events: none; }
  #overlay h1 { font-size: clamp(24px, 6vw, 44px); margin-bottom: 14px; text-shadow: 0 3px 10px rgba(0,0,0,0.6); letter-spacing: 1px; }
  #overlay p  { font-size: clamp(13px, 3.2vw, 18px); opacity: 0.9; line-height: 1.6; max-width: 90vw; }
  #overlay .blink { animation: blink 1.2s ease-in-out infinite; margin-top: 14px; font-weight: 600; color: #ffd166; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  /* ===== 选角卡片 ===== */
  #role-cards { display: flex; gap: 14px; margin: 18px 0; flex-wrap: wrap; justify-content: center; }
  .role-card {
    width: clamp(140px, 26vw, 200px); padding: 18px 14px; border-radius: 16px;
    background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15);
    cursor: pointer; transition: transform 0.15s, border-color 0.15s, background 0.15s; pointer-events: auto;
  }
  .role-card:hover, .role-card.sel { transform: translateY(-4px); border-color: #ffd166; background: rgba(255,209,102,0.14); }
  .role-card .emoji { font-size: clamp(40px, 9vw, 64px); line-height: 1; }
  .role-card .rname { font-size: clamp(16px, 4vw, 22px); font-weight: 800; margin-top: 8px; }
  .role-card .rkey  { font-size: 12px; opacity: 0.6; margin-top: 4px; }
  .role-card .rdesc { font-size: clamp(11px, 2.6vw, 13px); opacity: 0.82; margin-top: 8px; line-height: 1.4; }

  /* ===== 结算数据 ===== */
  #settle-stats { font-size: clamp(15px, 3.6vw, 20px); margin: 8px 0 18px; line-height: 1.8; }
  #settle-stats b { color: #ffd166; }
  .ov-buttons { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
  .ov-btn {
    padding: 12px 26px; border-radius: 12px; border: none; cursor: pointer; pointer-events: auto;
    font-size: clamp(14px, 3.4vw, 18px); font-weight: 800;
  }
  .ov-btn.primary { background: #ffd166; color: #1a1a1a; }
  .ov-btn.ghost   { background: rgba(255,255,255,0.14); color: #fff; }
  .ov-btn:active { transform: scale(0.97); }
  .win-big { font-size: clamp(30px, 9vw, 60px); font-weight: 900; margin-bottom: 8px; }
  .win-big.win  { color: #8fe388; }
  .win-big.lose { color: #ff7a7a; }

  /* ===== 移动端虚拟控件（M3）===== */
  /* 整个游戏区域禁手势滚动/缩放（触屏才挂 .touch 到 body）*/
  body.touch, body.touch #game-canvas { touch-action: none; }
  #touch-ui { position: fixed; inset: 0; z-index: 12; display: none; pointer-events: none; touch-action: none; }
  #touch-ui.on { display: block; }

  /* 左半屏：动态原点虚拟摇杆（按下处生成；JS 控制 left/top/display）*/
  #stick-move {
    position: absolute; width: 132px; height: 132px; border-radius: 50%;
    background: rgba(255,255,255,0.10); border: 2px solid rgba(255,255,255,0.28);
    transform: translate(-50%, -50%); display: none; pointer-events: none; touch-action: none;
    box-shadow: 0 0 12px rgba(0,0,0,0.18);
  }
  #stick-move.show { display: block; }
  #knob-move {
    position: absolute; left: 50%; top: 50%; width: 58px; height: 58px; margin: -29px 0 0 -29px;
    border-radius: 50%; background: rgba(255,255,255,0.42); border: 2px solid rgba(255,255,255,0.5);
    pointer-events: none;
  }

  /* 右下：技能大按钮（≥64px，冷却扇形罩）*/
  #touch-skill {
    position: absolute; right: 24px; bottom: 30px; width: 88px; height: 88px; border-radius: 50%;
    background: rgba(255,209,102,0.9); color: #1a1a1a; font-weight: 800; font-size: 13px;
    display: flex; align-items: center; justify-content: center; text-align: center; padding: 6px;
    pointer-events: auto; touch-action: none; overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3); line-height: 1.15;
  }
  #touch-skill.ready  { background: rgba(143,227,136,0.92); }
  #touch-skill.active { background: rgba(255,209,102,0.55); }
  /* 冷却扇形：conic-gradient 旋转遮罩（0=就绪无罩，1=整圈灰）*/
  #touch-skill .cd-arc {
    position: absolute; inset: 0; border-radius: 50%; pointer-events: none;
    background: conic-gradient(rgba(0,0,0,0.5) 0deg, rgba(0,0,0,0.5) 0deg, transparent 0deg);
  }
  #touch-skill span { position: relative; z-index: 2; }
  #touch-skill:active { transform: scale(0.94); }

  /* 右上：📷 视角 + 🔇 静音 小按钮（≥44px tap）*/
  #touch-btns { position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; pointer-events: none; }
  .touch-btn {
    width: 46px; height: 46px; border-radius: 12px; pointer-events: auto; touch-action: none;
    background: rgba(20,24,30,0.6); backdrop-filter: blur(3px); color: #fff; border: none;
    font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .touch-btn:active { transform: scale(0.92); background: rgba(20,24,30,0.85); }

  /* ===== 全屏闪白（脱链反馈，M3）===== */
  #screen-flash {
    position: fixed; inset: 0; z-index: 40; background: #fff; opacity: 0;
    pointer-events: none; transition: none;
  }

  /* ===== 开局教学提示条（M3，按角色一行，自动淡出）===== */
  #tutorial {
    position: fixed; z-index: 28; left: 50%; bottom: 34%; transform: translateX(-50%);
    background: rgba(20,24,30,0.7); color: #fff; padding: 10px 18px; border-radius: 12px;
    font-size: clamp(13px, 3.4vw, 16px); font-weight: 600; backdrop-filter: blur(3px);
    opacity: 0; transition: opacity 0.5s; pointer-events: none; text-align: center;
    max-width: calc(100vw - 32px); box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  }
  #tutorial.show { opacity: 1; }

  /* ===== 窄屏 / 竖屏 HUD 收紧（M3）：缩小内边距与字号，避免触屏控件重叠 ===== */
  @media (max-width: 480px) {
    .hud { font-size: 12px; padding: 6px 9px; }
    #hud-top { gap: 10px; font-size: 13px; }
    #hud-top .timer { font-size: 18px; }
    #hud-top .score .num { font-size: 18px; }
    #hud-cam { display: none; }   /* 触屏改用 📷 按钮，隐藏文字提示 */
    #hud-hint { display: none; }  /* 触屏用 ⚙️ 按钮在面板里，隐藏右下角文字 */
    /* 桌面底中技能提示在触屏上隐藏（用右下大按钮代替）*/
    body.touch #hud-skill { display: none; }
  }
  /* 竖屏专属：HUD 顶部更紧凑，技能按钮略缩 */
  @media (orientation: portrait) {
    #hud-status { top: 46px; }
    #touch-skill { width: 78px; height: 78px; bottom: 26px; right: 18px; }
  }
  /* 横屏矮屏（如 844×390）：避免顶部 HUD 与边缘控件挤一起 */
  @media (orientation: landscape) and (max-height: 430px) {
    #hud-top { top: 8px; }
    #touch-btns { top: 8px; }
    #touch-skill { bottom: 18px; }
    #stick-move { width: 116px; height: 116px; }
  }

  /* ===== 调参面板 ===== */
  #panel {
    position: fixed; z-index: 20; top: 12px; right: 12px;
    width: min(320px, calc(100vw - 24px));
    max-height: calc(100vh - 24px); overflow-y: auto;
    background: rgba(18, 22, 30, 0.92); color: #fff;
    border-radius: 12px; padding: 14px 16px; font-size: 13px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    display: none; backdrop-filter: blur(4px);
  }
  #panel.open { display: block; }
  #panel h2 { font-size: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  #panel h2 .close { cursor: pointer; opacity: 0.7; font-size: 18px; }
  #panel h2 .close:hover { opacity: 1; }
  .row { margin-bottom: 11px; }
  .row label { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .row label .val { color: #ffd166; font-variant-numeric: tabular-nums; }
  .row input[type=range] { width: 100%; cursor: pointer; accent-color: #ffd166; }
  #panel button.reset {
    width: 100%; margin-top: 6px; padding: 8px; border: none; border-radius: 8px;
    background: #ffd166; color: #1a1a1a; font-weight: 700; font-size: 13px; cursor: pointer;
  }
  #panel button.reset:active { transform: scale(0.98); }
</style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- HUD -->
  <div id="hud-top" class="hud">
    <span class="timer" id="timer-num">90</span>
    <span class="score">🪶 <span class="num" id="caught-num">0</span><span id="catch-goal">/3</span></span>
  </div>
  <div id="hud-status" class="hud"></div>
  <div id="hud-cam" class="hud">🎥 <span class="mode" id="cam-mode">跟随</span> <span style="opacity:.6">(V切)</span></div>
  <div id="hud-hint" class="hud">⚙️ Tab 调参</div>
  <!-- 底中技能提示 -->
  <div id="hud-skill" class="hud">
    <div class="skill-btn" id="skill-btn">
      <div class="cd-fill" id="skill-cd"></div>
      <div class="skill-name" id="skill-name">技能</div>
      <div class="skill-sub" id="skill-sub">空格</div>
    </div>
  </div>
  <div id="toast"></div>
  <!-- 开局教学提示（M3，按角色一行，5s 淡出） -->
  <div id="tutorial"></div>
  <!-- 屏幕边缘威胁指示（目标在视野外） -->
  <div id="threat-arrow"></div>
  <!-- 全屏闪白（脱链反馈，M3） -->
  <div id="screen-flash"></div>

  <!-- 覆盖层（选角 / 待机 / 结算共用，按 phase 切内容）-->
  <div id="overlay">
    <h1 id="ov-title">🐔 老鹰抓小鸡 · 方块版</h1>
    <!-- 选角阶段 -->
    <div id="ov-roleselect">
      <p>选一个角色（键盘 1 / 2 / 3 或点击卡片），另外两个由 AI 补位</p>
      <div id="role-cards">
        <div class="role-card" data-role="0">
          <div class="emoji">🦅</div><div class="rname">老鹰</div><div class="rkey">按 1</div>
          <div class="rdesc">冲刺扑击叼小鸡，抓满 3 只获胜</div>
        </div>
        <div class="role-card" data-role="1">
          <div class="emoji">🐔</div><div class="rname">母鸡</div><div class="rkey">按 2</div>
          <div class="rdesc">张翅当墙护娃，撑满 90 秒获胜</div>
        </div>
        <div class="role-card" data-role="2">
          <div class="emoji">🐤</div><div class="rname">队尾小鸡</div><div class="rkey">按 3</div>
          <div class="rdesc">紧急蹲下躲扑击，活到最后获胜</div>
        </div>
      </div>
    </div>
    <!-- 待机阶段 -->
    <div id="ov-ready" style="display:none">
      <p id="ready-role">你扮演：母鸡</p>
      <p style="margin-top:10px;font-size:clamp(13px,3vw,16px);opacity:0.8">🎥 V 切换视角　·　空格 用技能　·　Tab 调参</p>
      <p class="blink">按任意移动键开始</p>
    </div>
    <!-- 结算阶段 -->
    <div id="ov-settle" style="display:none">
      <div class="win-big" id="settle-big">胜利！</div>
      <div id="settle-stats"></div>
      <div class="ov-buttons">
        <button class="ov-btn primary" id="btn-again">↺ 再来一局</button>
        <button class="ov-btn ghost"   id="btn-changerole">🎭 换角色</button>
      </div>
    </div>
  </div>

  <!-- 移动端虚拟控件（M3：左半屏动态摇杆 / 右下技能 / 右上 视角+静音）-->
  <div id="touch-ui">
    <!-- 动态原点左摇杆：按下左半屏时 JS 把它移到触点处显示 -->
    <div id="stick-move"><div id="knob-move"></div></div>
    <!-- 右下技能大按钮（冷却扇形罩 + 名称）-->
    <div id="touch-skill"><div class="cd-arc" id="touch-cd"></div><span id="touch-skill-label">技能</span></div>
    <!-- 右上：📷 视角 / 🔇 静音 -->
    <div id="touch-btns">
      <button class="touch-btn" id="btn-cam" title="切换视角">📷</button>
      <button class="touch-btn" id="btn-mute" title="静音">🔊</button>
    </div>
  </div>

  <!-- 调参面板 -->
  <div id="panel">
    <h2>⚙️ 手感调参 <span class="close" id="panel-close">✕</span></h2>
    <div id="panel-rows"></div>
    <button class="reset" id="panel-reset">↺ 恢复默认</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.148.0/build/three.min.js"></script>
  <script>
  "use strict";
  // ════════════════════════════════════════════════════════════════════════
  // 《老鹰抓小鸡 · 方块版》M1 —— Minecraft 方块像素风
  // 物理架构 + 参数全部翻译自已验证好玩的 Unity 原型（ChickChain.cs / GameConfig.cs）
  // 不发明物理：行为层（主动跟跑）+ PBD 约束层（距离投影），固定步长 60Hz。
  // ════════════════════════════════════════════════════════════════════════

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [CONFIG] 所有调好的常数（对应 GameConfig.cs）。Tab 面板读写的就是这一份。
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const DEFAULTS = {
    // 老鹰
    eagleSpeed: 7.5, eagleAccel: 40, dashMultiplier: 2.2, dashDuration: 0.28, dashCooldown: 2.0,
    // 母鸡
    henSpeed: 6.0, henTurnSpeed: 240,            // 度/秒
    // ── 母鸡 AI / 卡位（HenAI.cs）──
    henBlockDistance: 1.4,                        // 卡位时离链头的距离
    henAggression: 0.5,                           // 0=贴链被动防守 1=顶到老鹰跟前
    henEngageRange: 14,                           // 老鹰进此范围才进入拦截姿态
    henWanderInterval: 4,                         // 远离威胁时随机遛弯换点间隔
    // ── 母鸡翅膀（HenWings.cs，开=挡板宽移速慢，收=窄快）──
    henWingWidth: 3.0,                            // 张开挡板宽
    henWingClosedSpan: 1.2,                       // 收拢挡板宽
    henWingOpenSpeedMult: 0.55,                   // 张开移速倍率
    henWingClosedSpeedMult: 1.0,                  // 收拢移速倍率
    henWingAnimTime: 0.25,                        // 开合动画时长
    henWingOpenRange: 7,                          // 老鹰距此值内 AI 张翅（迟滞 +2）
    // 小鸡 / 链条
    chickCount: 5,                                // M1 = 5 只（注意：参考里是 6）
    chickSpacing: 0.85,                           // 链节静止长度 restLength
    chickRunSpeed: 8, chickRunAccel: 35,
    chainSubsteps: 3, chainIterations: 2,
    chainDamping: 0.96, chainStretchLimit: 1.05, chainMaxCorrection: 0.35,
    tailSpeedAmplify: 0.35,

  // fps（第一人称）参数：眼高按受控角色取值（母鸡 1.45 / 小鸡 0.55 / 老鹰飞高 +0.2）

  const FPS = {

  };
  // 切换视角时相机位置/朝向的 0.4s 平滑过渡

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [工具] 小型数学辅助（避免到处 new Vector3 造 GC，关键处用临时量复用）
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 把向量 cur 朝 target 移动最多 maxDelta（对应 Unity Vector3.MoveTowards），返回新向量（写入 out）
  function moveTowards(out, cur, target, maxDelta) {
    const dx = target.x - cur.x, dy = target.y - cur.y, dz = target.z - cur.z;
    const distSq = dx * dx + dy * dy + dz * dz;
    if (distSq === 0 || (maxDelta >= 0 && distSq <= maxDelta * maxDelta)) {
      out.set(target.x, target.y, target.z); return out;
    }
    const dist = Math.sqrt(distSq);
    out.set(cur.x + dx / dist * maxDelta, cur.y + dy / dist * maxDelta, cur.z + dz / dist * maxDelta);
    return out;
  }
  // 标量朝目标移动
  function moveTowardsScalar(cur, target, maxDelta) {
    if (Math.abs(target - cur) <= maxDelta) return target;
    return cur + Math.sign(target - cur) * maxDelta;
  }
  function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }
  function clamp01(v) { return v < 0 ? 0 : (v > 1 ? 1 : v); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  // 向量限制最大模长（写回同一个向量）
  function clampMag(v, max) {
    const m2 = v.x * v.x + v.y * v.y + v.z * v.z;
    if (m2 > max * max) { const m = Math.sqrt(m2); v.multiplyScalar(max / m); }
    return v;
  }
  // 角度平滑插值（最短弧），degPerSec 为转速（度/秒），dt 秒
  function turnTowardsAngle(cur, target, degPerSec, dt) {
    let diff = target - cur;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    const maxStep = degPerSec * Math.PI / 180 * dt;
    if (Math.abs(diff) <= maxStep) return target;
    return cur + Math.sign(diff) * maxStep;
  }
  // 指数平滑系数 1 - exp(-rate·dt)
  function smoothFactor(rate, dt) { return 1 - Math.exp(-rate * dt); }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [场景搭建] renderer / scene / 光照 / 草地 / 栅栏 / 花草 / 雾
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  // ---- 母鸡（玩家）：白身 + 头 + 红冠 + 黄喙 + 红肉垂 + 双翅 + 双腿 + 尾巴，总高约 1.6 ----
  function makeHen() {
    const g = new THREE.Group();

    const legH = 0.4;

    const shoulderY = legH + 0.55;

    // 翅板本体（厚度薄、上下有高度，看得出是"墙"）
    const wingPlateL = box(1.0, 0.55, 0.5, -0.5, 0, 0, 0xf2f2f2); wingL.add(wingPlateL);
    const wingPlateR = box(1.0, 0.55, 0.5,  0.5, 0, 0, 0xf2f2f2); wingR.add(wingPlateR);
    // 翼尖深色点缀
    wingPlateL.add(box(0.25, 0.5, 0.45, -0.5, 0, 0, 0xdddddd));
    wingPlateR.add(box(0.25, 0.5, 0.45,  0.5, 0, 0, 0xdddddd));
    // 尾巴（身后上翘）
    const tail = box(0.5, 0.45, 0.35, 0, legH + 0.75, -0.75, 0xeeeeee);
    g.add(tail);

    const head = box(0.6, 0.6, 0.6, 0, legH + 1.0, 0.7, 0xffffff);
    g.add(head);

    g.add(box(0.12, 0.22, 0.16, 0, legH + 1.38, 0.6, 0xe23a3a));
    g.add(box(0.12, 0.28, 0.16, 0, legH + 1.42, 0.74, 0xe23a3a));
    g.add(box(0.12, 0.20, 0.16, 0, legH + 1.36, 0.88, 0xe23a3a));
    // 黄喙
    g.add(box(0.18, 0.16, 0.28, 0, legH + 0.96, 1.05, 0xf5b301));
    // 红肉垂（喙下方）
    g.add(box(0.12, 0.18, 0.1, 0, legH + 0.78, 0.98, 0xd02b2b));
    // 眼睛（黑，两侧）
    g.add(box(0.08, 0.1, 0.08, -0.22, legH + 1.08, 1.0, 0x111111));
    g.add(box(0.08, 0.1, 0.08,  0.22, legH + 1.08, 1.0, 0x111111));
    // 双腿（橙）
    const legL = box(0.16, legH, 0.16, -0.28, legH / 2, 0.1, 0xe88a1a);
    const legR = box(0.16, legH, 0.16,  0.28, legH / 2, 0.1, 0xe88a1a);
    g.add(legL); g.add(legR);
    g.userData = { wingL, wingR, wingPlateL, wingPlateR, legL, legR, legH, body };
    return g;
  }

  // ---- 小鸡 ×N：亮黄身 + 橙喙 + 黑眼 + 迷你腿，身约 0.45 ----
  function makeChick() {
    const g = new THREE.Group();
    const legH = 0.12;
    const body = box(0.45, 0.42, 0.5, 0, legH + 0.21, 0, 0xffe14d);
    g.add(body);
    // 头（略小，前上）
    const head = box(0.3, 0.3, 0.3, 0, legH + 0.46, 0.2, 0xffe14d);
    g.add(head);
    // 橙喙
    g.add(box(0.1, 0.08, 0.14, 0, legH + 0.44, 0.4, 0xf08a1a));
    // 黑眼
    g.add(box(0.05, 0.06, 0.05, -0.1, legH + 0.5, 0.32, 0x111111));
    g.add(box(0.05, 0.06, 0.05,  0.1, legH + 0.5, 0.32, 0x111111));
    // 迷你腿
    const legL = box(0.07, legH, 0.07, -0.12, legH / 2, 0, 0xe88a1a);
    const legR = box(0.07, legH, 0.07,  0.12, legH / 2, 0, 0xe88a1a);
    g.add(legL); g.add(legR);
    g.userData = { body, legL, legR, legH, baseColor: 0xffe14d };
    return g;
  }

  // ---- 老鹰：深棕身 + 白灰头 + 黄钩喙 + 大翅膀（扇动）+ 尾羽 ----
  function makeEagle() {
    const g = new THREE.Group();
    const body = box(0.8, 0.7, 1.4, 0, 0, 0, 0x5a3d22);
    g.add(body);
    // 头（白灰，前方）
    const head = box(0.55, 0.55, 0.55, 0, 0.18, 0.85, 0xd8d8d0);
    g.add(head);
    // 黄钩喙（两块拼出钩：前伸 + 下钩）
    g.add(box(0.16, 0.16, 0.34, 0, 0.16, 1.2, 0xf5b301));
    g.add(box(0.14, 0.2, 0.12, 0, 0.05, 1.32, 0xe09000));
    // 黑眼
    g.add(box(0.07, 0.09, 0.07, -0.18, 0.26, 1.05, 0x111111));
    g.add(box(0.07, 0.09, 0.07,  0.18, 0.26, 1.05, 0x111111));
    // 大翅膀：用 pivot 组实现"从肩部扇动"，翅膀本体偏到外侧
    const wingL = new THREE.Group();
    const wingMeshL = box(1.8, 0.14, 0.9, -0.9, 0, 0, 0x6b4a2a, true);
    wingL.add(wingMeshL); wingL.position.set(-0.4, 0.1, 0); g.add(wingL);
    const wingR = new THREE.Group();
    const wingMeshR = box(1.8, 0.14, 0.9, 0.9, 0, 0, 0x6b4a2a, true);
    wingR.add(wingMeshR); wingR.position.set(0.4, 0.1, 0); g.add(wingR);
    // 翼尖深色羽（点缀）
    wingMeshL.add(box(0.6, 0.16, 0.5, -1.55 + 0.9, 0, -0.1, 0x3d2814)); // 相对 wingMeshL 局部
    wingMeshR.add(box(0.6, 0.16, 0.5, 1.55 - 0.9, 0, -0.1, 0x3d2814));
    // 尾羽（身后）
    g.add(box(0.6, 0.12, 0.7, 0, 0, -1.0, 0x4a3219));
    // 折叠收爪：两条橙黄短腿 + 三趾抓钩，贴腹部，模拟飞行中收起的爪（对应母鸡 legL/legR 写法）
    // 趾钩直接挂到 g 下（不挂在被 scale 过的腿上，避免几何被拉伸变形）
    function addTalon(side) {
      const lx = side * 0.22;
      g.add(box(0.1, 0.25, 0.1, lx, -0.15, 0.12, 0xe0a020)); // 短腿
      // 三趾抓钩：3 个扁方块，从脚踝略向前下方收拢
      g.add(box(0.05, 0.05, 0.18, lx - 0.06, -0.3, 0.18, 0xc98a18));
      g.add(box(0.05, 0.05, 0.18, lx,        -0.3, 0.2,  0xc98a18));
      g.add(box(0.05, 0.05, 0.18, lx + 0.06, -0.3, 0.18, 0xc98a18));
    }
    addTalon(-1); addTalon(1);
    g.userData = { wingL, wingR, body };
    return g;
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [角色状态] 用纯数据结构持有物理状态（位置/速度/朝向），Mesh 只做渲染
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  // 母鸡状态
  const hen = {
    mesh: makeHen(),
    pos: new THREE.Vector3(0, 0, 6),
    vel: new THREE.Vector3(0, 0, 0),
    yaw: Math.PI,           // 面朝 -Z（朝场地南/镜头方向起步无所谓，会平滑转）
    forward: new THREE.Vector3(0, 0, -1),
    bob: 0,                 // 走路上下颠相位
    // ── 翅膀（技能：开/收切换；wingOpen 目标，wingT 0→1 动画进度）──
    wingOpen: false,
    _lastWingOpen: false,   // 上帧目标（检测翻转播扑哧音）
    wingT: 0,
    // ── 踉跄（翅膀超时/护盾超时，调研指令 #4/#12）──
    staggerTimer: 0,
    // ── AI 遛弯状态（HenAI.cs）──
    wanderTarget: new THREE.Vector3(),
    wanderTimer: 0,
    wanderInit: false,
  };
  scene.add(hen.mesh);
  // 翅膀当前生效挡板宽（碰撞解算用，syncVisuals 按 wingT 更新）
  hen.wingSpan = CFG.henWingClosedSpan;

  // 小鸡链（行为状态数组）：chicks=链上（参与 PBD），detached=脱链散兵（自己跑回家）
  const chicks = [];
  const detached = [];
  // 玩家控制的小鸡（仅 playerRole===CHICK 时非 null，被抓后迁移到新队尾）。
  // 提前到 buildChicks 之前声明：buildChicks→refreshChickMarker 会读它，否则 TDZ。
  let controlledChick = null;
  function buildChicks() {
    // 清掉旧的（链上 + 脱链）
    for (const c of chicks) scene.remove(c.mesh);
    for (const c of detached) scene.remove(c.mesh);
    chicks.length = 0;
    detached.length = 0;
    const n = CFG.chickCount;
    // 用母鸡 forward 的反方向（身后）排队
    const bx = -hen.forward.x, bz = -hen.forward.z;
    for (let i = 0; i < n; i++) {
      const mesh = makeChick();
      const px = hen.pos.x + bx * CFG.chickSpacing * (i + 1);
      const pz = hen.pos.z + bz * CFG.chickSpacing * (i + 1);
      mesh.position.set(px, 0, pz);
      scene.add(mesh);
      chicks.push({
        mesh,
        pos: new THREE.Vector3(px, 0, pz),
        vel: new THREE.Vector3(0, 0, 0),
        yaw: hen.yaw,
        bob: Math.random() * Math.PI * 2,  // 错开走路相位
        index: i,
        // ── 脱链状态（ChickChain.cs）──
        detached: false,
        overload: 0,                        // 超载累计时间
        reattachCd: 0,                      // 重连保护期（防荡秋千误判）
        // ── 蹲下状态（Chick.cs）──
        crouchTimer: 0,
        crouchCd: 0,
        playerSteer: new THREE.Vector3(),   // 玩家小鸡本帧期望方向（仅 controlled 小鸡非零）
        staggerAnim: 0,                     // near-miss 趔趄动画剩余（M3，纯视觉）
      });
    }
    // 开局脱手保护期（对应 ChickChain._buildGrace = 2f）
    buildGrace = 2.0;
    // 队尾小鸡标记（玩家选小鸡时显示白帽）
    refreshChickMarker();
  }
  let buildGrace = 0;

  // 队尾小鸡白帽标记：玩家选小鸡时，给当前队尾挂一个浅蓝小球（对应 RoundManager 的 PlayerHat）。
  // 被抓后队尾变化要重挂，所以每次链条变动调用一次。
  let chickMarkerMesh = null;
  function refreshChickMarker() {
    if (chickMarkerMesh && chickMarkerMesh.parent) chickMarkerMesh.parent.remove(chickMarkerMesh);
    chickMarkerMesh = null;
    controlledChick = null;
    if (playerRole !== ROLE.CHICK || chicks.length === 0) return;
    const tail = chicks[chicks.length - 1];
    controlledChick = tail;
    const hat = box(0.22, 0.22, 0.22, 0, 0.85, 0, 0x8cd8ff, false);
    tail.mesh.add(hat);
    chickMarkerMesh = hat;
  }
  buildChicks();

  // 老鹰状态
  const eagle = {
    mesh: makeEagle(),
    pos: new THREE.Vector3(0, 1.6, -16),
    vel: new THREE.Vector3(0, 0, 0),
    yaw: 0,
    forward: new THREE.Vector3(0, 0, 1),
    state: 'ORBIT',          // ORBIT / ATTACK / RETREAT
    orbitDir: 1,             // +1 / -1 盘旋方向
    orbitAngle: 0,           // 当前盘旋角
    dashTimer: 0,            // 冲刺剩余时间
    dashCooldown: 0,         // 冲刺冷却剩余
    attackTimer: 0,          // ATTACK 已持续时间（僵局检测）
    attackBestDist: Infinity,// ATTACK 期间刷新到的最近队尾距离
    retreatTimer: 0,         // RETREAT 计时
    wingPhase: 0,            // 翅膀扇动相位
    targetY: 1.6,            // 飞行目标高度（俯冲压低）
    // ── 技能 / 状态 ──
    dashCharge: 0,           // 蓄力前摇剩余（调研指令 #1：0.3s 低头蓄力，期间速度 0）
    dashGotCatch: false,     // 本次冲刺是否已抓到（控制扑空翻滚判定，起冲时复位）
    staggerTimer: 0,         // 得手/扑空后僵直（被弹开，输入无效）
    catchCd: 0,              // 抓捕冷却（一次俯冲最多一只）
    rollTimer: 0,            // 扑空翻滚动画剩余（调研指令 #5/#12）
    // ── AI ──
    target: null,            // 当前目标（小鸡对象）
    rescanTimer: 0,
    bestDist: Infinity,
    stuckTimer: 0,
    maneuver: 0,             // 0=无 1=强攻 2=绕后
    maneuverTimer: 0,
    maneuverPoint: new THREE.Vector3(),
    maneuverCommit: false,
    flankSign: 1,
  };
  scene.add(eagle.mesh);

  // ── 受控角色引用：选角后指向 hen / eagle / 队尾小鸡（输入/相机/技能都读 controlled）──
  let controlled = hen;
  // controlledChick 已在 chicks 数组旁提前声明（buildChicks 需要它）。

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [输入] 键盘，preventDefault 方向键/空格/Tab，世界轴向移动
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const keys = {};
  const MOVE_KEYS = new Set([
    'KeyW', 'KeyA', 'KeyS', 'KeyD',
    'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'
  ]);
  let panelOpen = false;
  let camMode = 'follow';  // 当前视角模式（follow / fps / top），默认第三人称跟背
  // camYaw：follow/fps 下相机自己的偏航（指数平滑追角色 yaw）。在 updateCamera 里维护。
  let camYaw = controlled.yaw;

  window.addEventListener('keydown', (e) => {
    // 阻止方向键/空格滚动页面、Tab 跳焦点
    if (MOVE_KEYS.has(e.code) || e.code === 'Space' || e.code === 'Tab') {
      e.preventDefault();
    }
    keys[e.code] = true;

    // ── 选角阶段：1/2/3 选角色（不开局，进 READY 待机）──
    if (phase === PHASE.ROLE_SELECT) {
      if (e.code === 'Digit1' || e.code === 'Numpad1') selectRole(ROLE.EAGLE);
      else if (e.code === 'Digit2' || e.code === 'Numpad2') selectRole(ROLE.HEN);
      else if (e.code === 'Digit3' || e.code === 'Numpad3') selectRole(ROLE.CHICK);
      return;
    }

    // ── 待机阶段：第一个移动键 → 开局 RUNNING ──
    if (phase === PHASE.READY && MOVE_KEYS.has(e.code)) {
      beginRound();
    }

    // ── 技能：空格（仅 RUNNING 中，由受控角色分派）──
    if (e.code === 'Space' && !e.repeat && phase === PHASE.RUNNING) {
      triggerSkill();
    }

    // Tab 开合调参面板
    if (e.code === 'Tab') togglePanel();
    // V 循环切换视角 follow → fps → top
    if (e.code === 'KeyV' && !e.repeat) cycleCamMode();
    // M 静音切换（桌面端：静音按钮只在触屏 UI，键盘补一条通道）
    if (e.code === 'KeyM' && !e.repeat) toggleMute();

    // ── 结算阶段键盘通道：Enter/空格 再来一局，R 换角色（与按钮点击双通道）──
    if (phase === PHASE.SETTLE) {
      if (e.code === 'Enter' || e.code === 'Space') restartSameRole();
      else if (e.code === 'KeyR') backToRoleSelect();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (MOVE_KEYS.has(e.code) || e.code === 'Space' || e.code === 'Tab') e.preventDefault();
    keys[e.code] = false;
  });

  // 读出受控角色的世界移动方向（已归一化），按当前视角模式决定输入来源。
  // 返回的是要喂给链条物理"母鸡期望速度"的世界方向；物理数学不变，只换这个来源。
  //  - top  ：世界轴向（M1 现状）。镜头南侧看 → W=-Z 远离镜头。
  //  - follow：把屏幕输入按相机 yaw 旋转成世界方向（推哪个屏幕方向就往哪跑）。
  //  - fps  ：坦克式。W/S（左摇杆上下）沿角色 forward 进退（后退 0.5 倍速）；A/D（左摇杆左右）原地转向。
  // M3：移除右朝向摇杆，单左摇杆通吃 —— fps 用左摇杆 x 当转向，follow/top 用左摇杆向量当移动。
  // fpsTankTurn 标志：fps 下输入已直接驱动 yaw，physicsStep 里不要再用"速度方向"覆盖朝向。
  const inputDir = new THREE.Vector3();
  let fpsTankTurn = false;
  function readInput(out, dt) {
    fpsTankTurn = false;
    const up    = keys['KeyW'] || keys['ArrowUp'];
    const down  = keys['KeyS'] || keys['ArrowDown'];
    const left  = keys['KeyA'] || keys['ArrowLeft'];
    const right = keys['KeyD'] || keys['ArrowRight'];

    // ── 移动端左摇杆：移动（死区 0.15，folded 进 x/z，下方与 WASD 合流）──
    const tmActive = IS_TOUCH && (Math.abs(touchMove.x) > 0.15 || Math.abs(touchMove.y) > 0.15);
    const tmx = tmActive ? touchMove.x : 0;
    const tmy = tmActive ? touchMove.y : 0;

    if (camMode === 'fps') {
      // ── 坦克式控制 ──
      // forward = (sin yaw, cos yaw)；d(forward)/d(yaw) = (cos yaw, -sin yaw) = 角色右手向量。
      // 故 yaw 增大 = 朝右转。D 增 yaw（右转），A 减 yaw（左转）。
      fpsTankTurn = true;
      const turnDeg = CFG.henTurnSpeed;        // 母鸡转速；M2 其它角色可分支
      let turn = 0;
      if (right) turn += 1;
      if (left)  turn -= 1;
      if (Math.abs(tmx) > 0.15) turn += tmx;   // 触屏左摇杆左右 = 转向
      controlled.yaw += turn * (turnDeg * Math.PI / 180) * (dt || 0);
      controlled.forward.set(Math.sin(controlled.yaw), 0, Math.cos(controlled.yaw));
      camYaw = controlled.yaw;                 // 让 follow 相机记忆跟上手动转向
      // W/S（或左摇杆上下）沿 forward 进退（后退 0.5 倍速；模长 <1 体现倍速，下游乘 henSpeed）
      let drive = 0;
      if (up)   drive += 1;
      if (down) drive -= 0.5;
      if (tmy < -0.15) drive += -tmy;          // 触屏左摇杆上=前进
      else if (tmy > 0.15) drive -= tmy * 0.5; // 下=后退半速
      out.set(controlled.forward.x * drive, 0, controlled.forward.z * drive);
      return out;
    }

    // follow / top：先取屏幕轴输入（键盘 + 触屏左摇杆合流）
    let x = 0, z = 0;
    if (up)    z -= 1;  // 远离镜头 / 屏幕上
    if (down)  z += 1;  // 朝向镜头 / 屏幕下
    if (left)  x -= 1;
    if (right) x += 1;
    x += tmx; z += tmy;   // 触屏左摇杆：屏幕右=+x，屏幕下=+z
    out.set(x, 0, z);
    if (out.lengthSq() > 0) out.normalize();

    if (camMode === 'follow' && out.lengthSq() > 0) {
      // 按相机 yaw 把屏幕方向旋转成世界方向。
      // camYaw 定义：相机在角色身后，朝 +(sin camYaw, cos camYaw) 方向"看进画面"。
      // 屏幕"上(-z)"= 看向方向；屏幕"右(+x)"= 看向方向右手侧。
      const s = Math.sin(camYaw), c = Math.cos(camYaw);
      // forward(看向)世界向量 = (s, c)；right 世界向量 = (c, -s)
      const wx = -out.z * s + out.x * c;
      const wz = -out.z * c - out.x * s;
      out.set(wx, 0, wz);
      // 旋转保持单位长度（out 旋转前已归一化），无需再 normalize
    }
    return out;
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [链条物理] 固定步长一步。严格照 ChickChain.cs 翻译。
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  // 临时复用向量（避免每步 new）
  const _tmpDesired = new THREE.Vector3();
  const _tmpHorz = new THREE.Vector3();
  const _tmpDelta = new THREE.Vector3();
  const _henAnchor = new THREE.Vector3();
  const _henRight = new THREE.Vector3();
  const _threatFwd = new THREE.Vector3();
  const _toChick = new THREE.Vector3();
  const _slot = new THREE.Vector3();
  const _chainDir = new THREE.Vector3();
  const _leaderPos = new THREE.Vector3();
  const _leaderOfPrev = new THREE.Vector3();
  // PBD 工作位置数组
  const pbdPos = [];
  // 行为层 leader 读取用的"帧开头快照"（对应 C# 中 _pbdPos 在行为层只读不写的语义）
  const startPos = [];

  // 母鸡锚点：母鸡身后半个间距，纯水平（对应 HenAnchor()）
  function computeHenAnchor(out) {
    out.set(
      hen.pos.x - hen.forward.x * (CFG.chickSpacing * 0.5),
      hen.pos.y,
      hen.pos.z - hen.forward.z * (CFG.chickSpacing * 0.5)
    );
    return out;
  }

  // "母鸡→老鹰"威胁方向（对应 ThreatForward()）；老鹰冻结/退化时用母鸡 forward
  function computeThreatForward(out) {
    const dx = eagle.pos.x - hen.pos.x, dz = eagle.pos.z - hen.pos.z;
    if (dx * dx + dz * dz > 0.01) {
      const d = Math.sqrt(dx * dx + dz * dz);
      out.set(dx / d, 0, dz / d);
    } else {
      out.set(hen.forward.x, 0, hen.forward.z);
    }
    return out;
  }

  // 把一个水平位置钳制到场地内
  function clampToArena(p, margin) {
    const hw = CFG.arenaWidth / 2 - margin, hd = CFG.arenaDepth / 2 - margin;
    p.x = clamp(p.x, -hw, hw);
    p.z = clamp(p.z, -hd, hd);
  }

  function physicsStep(dt) {
    if (buildGrace > 0) buildGrace -= dt;
    const n = chicks.length;

    // ───────────────────────────────────────────────────────────────
    // [1] 母鸡：玩家控制 → 输入驱动；AI 控制 → henAIStep 写好 vel/yaw（已在外层调过）
    //     翅膀移速倍率 + 踉跄期间不能动（调研指令 #4/#12）
    // ───────────────────────────────────────────────────────────────
    if (playerRole === ROLE.HEN) {
      // readInput 按当前视角模式产出世界期望方向（top=世界轴 / follow=按相机yaw旋转 / fps=坦克式）。
      readInput(inputDir, dt);
      // 翅膀张开移速变慢（收=1.0 开=0.55，HenWings.SpeedMult 翻译）
      const wingMult = lerp(CFG.henWingClosedSpeedMult, CFG.henWingOpenSpeedMult, hen.wingT);
      const moveScale = hen.staggerTimer > 0 ? 0 : wingMult;   // 踉跄期间定身
      _tmpDesired.set(inputDir.x * CFG.henSpeed * moveScale, 0, inputDir.z * CFG.henSpeed * moveScale);
      moveTowards(hen.vel, hen.vel, _tmpDesired, 40 * dt);
      hen.pos.x += hen.vel.x * dt;
      hen.pos.z += hen.vel.z * dt;
      clampToArena(hen.pos, 1.0);
      // 朝向：fps 坦克模式下 yaw 已由 A/D 直接驱动；其余模式朝速度方向平滑
      if (!fpsTankTurn && hen.vel.lengthSq() > 0.04) {
        const targetYaw = Math.atan2(hen.vel.x, hen.vel.z);
        hen.yaw = turnTowardsAngle(hen.yaw, targetYaw, CFG.henTurnSpeed, dt);
      }
      hen.forward.set(Math.sin(hen.yaw), 0, Math.cos(hen.yaw));
    } else {
      henAIStep(dt);   // AI 母鸡：写 hen.vel / hen.pos / hen.yaw / 翅膀目标
    }
    if (hen.staggerTimer > 0) hen.staggerTimer -= dt;

    if (n === 0) return;

    // 确保 pbdPos / startPos 长度足够
    while (pbdPos.length < n) pbdPos.push(new THREE.Vector3());
    while (startPos.length < n) startPos.push(new THREE.Vector3());

    // 快照本步开头位置。
    // startPos = 帧开头快照，行为层只读不写（对应 C# 里 _pbdPos 在行为层不被修改的语义）。
    // pbdPos   = 工作位置：行为层在其上做显式速度积分（JS 无外部物理引擎，C# 靠 Unity 在
    //            FixedUpdate 后步进 rb.position；这里把 vel*dt 当成预测步直接写进 pbdPos，
    //            等价于"从帧开头位置出发的 position prediction"，PBD 随后在其上投影约束），有意为之。
    for (let i = 0; i < n; i++) { pbdPos[i].copy(chicks[i].pos); startPos[i].copy(chicks[i].pos); }

    // ───────────────────────────────────────────────────────────────
    // [1.5] 超载脱手判定（ChickChain.cs [1] 段）：用帧开头原始拉伸（投影前），从尾往头扫，
    //       持续超载 > overloadDuration → 从断点到队尾整段脱链。开局 buildGrace 内跳过。
    // ───────────────────────────────────────────────────────────────
    if (buildGrace <= 0) {
      computeHenAnchor(_henAnchor);
      let breakIndex = -1;
      for (let i = n - 1; i >= 0; i--) {
        const c = chicks[i];
        if (c.reattachCd > 0) continue;     // 刚重连保护期跳过
        const lx = i === 0 ? _henAnchor.x : startPos[i - 1].x;
        const lz = i === 0 ? _henAnchor.z : startPos[i - 1].z;
        const raw = Math.hypot(startPos[i].x - lx, startPos[i].z - lz) / CFG.chickSpacing;
        if (raw > CFG.overloadStretch) c.overload += dt;
        else c.overload = Math.max(0, c.overload - 2 * dt);
        if (c.overload > CFG.overloadDuration) { breakIndex = i; break; }
      }
      if (breakIndex >= 0) { detachFrom(breakIndex); return; } // 链已变，下一物理步重来
    }

    // ───────────────────────────────────────────────────────────────
    // [2] 行为层：每只链上小鸡主动跟跑槽位（直接改速度）
    //     前半球（以母鸡→老鹰为轴）强制全速绕侧回后方
    // ───────────────────────────────────────────────────────────────
    computeHenAnchor(_henAnchor);
    computeThreatForward(_threatFwd);
    // 母鸡横向轴 = up × threatFwd
    _henRight.set(_threatFwd.z, 0, -_threatFwd.x); // = cross(up, threatFwd) 的水平结果
    {
      // 归一化 henRight
      const rl = Math.hypot(_henRight.x, _henRight.z);
      if (rl > 1e-5) { _henRight.x /= rl; _henRight.z /= rl; }
    }
    const henRadius = 0.8 + CFG.chickSpacing * 0.5;

    for (let i = 0; i < n; i++) {
      const c = chicks[i];
      // 蹲着不跑（手还抓着）——对应 ChickChain.cs `if (c.IsCrouched) continue;`
      if (c.crouchTimer > 0) { c.vel.x = 0; c.vel.z = 0; continue; }
      const myPos = startPos[i];   // 自身位置也读帧开头快照，跟 leaderPos 同一参考系

      // ---- 前半球判定 ----
      _toChick.set(myPos.x - hen.pos.x, 0, myPos.z - hen.pos.z);
      const inFront = (_toChick.x * _threatFwd.x + _toChick.z * _threatFwd.z) > 0;

      _tmpDesired.set(0, 0, 0);

      if (inFront) {
        // 前半球：全速绕向左右两侧中更近一侧的目标点
        const sideOffset = henRadius + 0.8;
        const lx = hen.pos.x - _henRight.x * sideOffset, lz = hen.pos.z - _henRight.z * sideOffset;
        const rx = hen.pos.x + _henRight.x * sideOffset, rz = hen.pos.z + _henRight.z * sideOffset;
        const dl = (myPos.x - lx) ** 2 + (myPos.z - lz) ** 2;
        const dr = (myPos.x - rx) ** 2 + (myPos.z - rz) ** 2;
        const tx = dl < dr ? lx : rx, tz = dl < dr ? lz : rz;
        const sx = tx - myPos.x, sz = tz - myPos.z;
        const sideDist = Math.hypot(sx, sz);
        if (sideDist > 0.01) {
          // 全速绕侧（紧急，不用 ampFact）
          const speed = Math.min(CFG.chickRunSpeed, sideDist / dt);
          _tmpDesired.set(sx / sideDist * speed, 0, sz / sideDist * speed);
        }
      } else {
        // ---- 正常槽位跟跑 ----
        // leaderPos：第0只=母鸡锚点，其余=前一只的帧开头快照（不读积分后的 pbdPos，避免级联跟手）
        if (i === 0) _leaderPos.copy(_henAnchor);
        else _leaderPos.copy(startPos[i - 1]);

        // chainDir：第0只 = -hen.forward；其余 = (pos[i-1] - leaderOfPrev) 归一（同样用帧开头快照）
        if (i === 0) {
          _chainDir.set(-hen.forward.x, 0, -hen.forward.z);
        } else {
          if (i === 1) _leaderOfPrev.copy(_henAnchor);
          else _leaderOfPrev.copy(startPos[i - 2]);
          const dx = startPos[i - 1].x - _leaderOfPrev.x, dz = startPos[i - 1].z - _leaderOfPrev.z;
          const dl = dx * dx + dz * dz;
          if (dl > 1e-4) { const d = Math.sqrt(dl); _chainDir.set(dx / d, 0, dz / d); }
          else _chainDir.set(-hen.forward.x, 0, -hen.forward.z);
        }

        // slot = leaderPos + chainDir × spacing
        _slot.set(
          _leaderPos.x + _chainDir.x * CFG.chickSpacing, 0,
          _leaderPos.z + _chainDir.z * CFG.chickSpacing
        );
        const toSx = _slot.x - myPos.x, toSz = _slot.z - myPos.z;
        const dist = Math.hypot(toSx, toSz);
        if (dist > 0.01) {
          // 尾端鞭甩：ampFact 一次性系数，绝不复利
          const ampFact = n > 1 ? (1 + i / (n - 1) * CFG.tailSpeedAmplify) : 1;
          const speed = Math.min(CFG.chickRunSpeed * ampFact, dist / dt);
          _tmpDesired.set(toSx / dist * speed, 0, toSz / dist * speed);
        }
      }

      // ---- 链上小鸡自保躲避（Chick.cs：撤回母鸡身后的小推力，叠加在跟跑上）----
      // 非玩家小鸡 + 老鹰进 evadeRadius 才躲；玩家小鸡用 playerSteer 不自动躲
      if (c !== controlledChick) {
        const edx = c.pos.x - eagle.pos.x, edz = c.pos.z - eagle.pos.z;
        const ed = Math.hypot(edx, edz);
        if (ed < CFG.chickEvadeRadius && ed > 0.01) {
          let ax = edx / ed, az = edz / ed;
          // 叠加"躲到母鸡身后"分量
          const sx = hen.pos.x - hen.forward.x * 1.5 - c.pos.x;
          const sz = hen.pos.z - hen.forward.z * 1.5 - c.pos.z;
          const sl = Math.hypot(sx, sz);
          if (sl > 0.01) { ax = ax + sx / sl * 0.7; az = az + sz / sl * 0.7; const al = Math.hypot(ax, az); ax /= al; az /= al; }
          const strength = 6.0 * (1 - ed / CFG.chickEvadeRadius);  // 小推力（速度增量）
          _tmpDesired.x += ax * strength; _tmpDesired.z += az * strength;
        }
      }

      // ---- 玩家操控混入（B3：chickSteerWeight 混合跟跑本能）----
      if (c === controlledChick && c.playerSteer.lengthSq() > 0.01) {
        const w = CFG.chickSteerWeight;
        const px = c.playerSteer.x * CFG.chickRunSpeed, pz = c.playerSteer.z * CFG.chickRunSpeed;
        _tmpDesired.x = lerp(_tmpDesired.x, px, w);
        _tmpDesired.z = lerp(_tmpDesired.z, pz, w);
      }

      // 速度 MoveTowards（只动水平分量；本游戏全在 y=0 平面，y 速度恒 0）
      _tmpHorz.set(c.vel.x, 0, c.vel.z);
      moveTowards(_tmpHorz, _tmpHorz, _tmpDesired, CFG.chickRunAccel * dt);
      c.vel.x = _tmpHorz.x; c.vel.z = _tmpHorz.z;

      // 位置积分（行为层先积分，PBD 再投影修正）
      pbdPos[i].x += c.vel.x * dt;
      pbdPos[i].z += c.vel.z * dt;
    }

    // ───────────────────────────────────────────────────────────────
    // [3] PBD 约束层：chainSubsteps 子步 × chainIterations 迭代
    //     只约束拉伸；后半球独立大钳制；每子步速度阻尼
    // ───────────────────────────────────────────────────────────────
    computeHenAnchor(_henAnchor);     // 母鸡可能在 [1] 后位置已更新，重取
    const henFx = hen.forward.x, henFz = hen.forward.z; // 约束层用 forward
    const restLen = CFG.chickSpacing;
    const maxLen = restLen * CFG.chainStretchLimit;
    const maxCorr = CFG.chainMaxCorrection / CFG.chainSubsteps;

    for (let sub = 0; sub < CFG.chainSubsteps; sub++) {
      // b. 距离约束：只约束拉伸，不约束压缩
      for (let iter = 0; iter < CFG.chainIterations; iter++) {
        for (let i = 0; i < n; i++) {
          const lx = i === 0 ? _henAnchor.x : pbdPos[i - 1].x;
          const lz = i === 0 ? _henAnchor.z : pbdPos[i - 1].z;
          const dx = pbdPos[i].x - lx, dz = pbdPos[i].z - lz;
          const dist = Math.hypot(dx, dz);
          if (dist <= maxLen || dist < 1e-4) continue;
          const correction = dist - maxLen;
          const dirx = dx / dist, dirz = dz / dist;
          if (i === 0) {
            // leader = 母鸡锚点（不动），小鸡承担 100%
            let mx = -dirx * correction, mz = -dirz * correction;
            // 钳制
            const ml = Math.hypot(mx, mz);
            if (ml > maxCorr) { mx = mx / ml * maxCorr; mz = mz / ml * maxCorr; }
            pbdPos[i].x += mx; pbdPos[i].z += mz;
          } else {
            // 相邻对等质量各担 50%
            let hx = dirx * (correction * 0.5), hz = dirz * (correction * 0.5);
            const hl = Math.hypot(hx, hz);
            if (hl > maxCorr) { hx = hx / hl * maxCorr; hz = hz / hl * maxCorr; }
            pbdPos[i].x -= hx; pbdPos[i].z -= hz;
            pbdPos[i - 1].x += hx; pbdPos[i - 1].z += hz;
          }
        }
      }

      // c. 后半球硬约束：小鸡在母鸡 forward 前方（dot>0.2）→ 投影到侧后切向
      for (let i = 0; i < n; i++) {
        const tcx = pbdPos[i].x - hen.pos.x, tcz = pbdPos[i].z - hen.pos.z;
        const dotF = tcx * henFx + tcz * henFz;
        if (dotF > 0.2) {
          const toMag = Math.hypot(tcx, tcz);
          // 切向 = toChick - forward·dot
          const tanx = tcx - henFx * dotF, tanz = tcz - henFz * dotF;
          const tanMag = Math.hypot(tanx, tanz);
          let candx, candz;
          if (tanMag > 1e-3) {
            const keep = Math.max(0.1, toMag);
            candx = hen.pos.x + tanx / tanMag * keep;
            candz = hen.pos.z + tanz / tanMag * keep;
          } else {
            candx = hen.pos.x - henFx * CFG.chickSpacing;
            candz = hen.pos.z - henFz * CFG.chickSpacing;
          }
          // 拉到 leader 允许范围内
          const lx = i === 0 ? _henAnchor.x : pbdPos[i - 1].x;
          const lz = i === 0 ? _henAnchor.z : pbdPos[i - 1].z;
          const flx = candx - lx, flz = candz - lz;
          const flMag = Math.hypot(flx, flz);
          if (flMag > maxLen) {
            candx = lx + flx / flMag * maxLen;
            candz = lz + flz / flMag * maxLen;
          }
          // 用独立大钳制 BACK_HEMISPHERE_MAX_CORR
          let corrx = candx - pbdPos[i].x, corrz = candz - pbdPos[i].z;
          const cm = Math.hypot(corrx, corrz);
          if (cm > BACK_HEMISPHERE_MAX_CORR) {
            corrx = corrx / cm * BACK_HEMISPHERE_MAX_CORR;
            corrz = corrz / cm * BACK_HEMISPHERE_MAX_CORR;
          }
          pbdPos[i].x += corrx; pbdPos[i].z += corrz;
        }
      }

      // d. 小鸡间最小间距：Unity 原型靠刚体碰撞天然撑开，这里没有物理引擎，
      //    链条又"只约束拉伸不约束压缩"，不加这条小鸡会叠死在同一点（实测会发生且不自愈）。
      //    全对检查（n≤5 共 ≤10 对），各担 50%，重合时沿母鸡侧向确定性破对称。
      for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
          let sx = pbdPos[j].x - pbdPos[i].x, sz = pbdPos[j].z - pbdPos[i].z;
          const sd = Math.hypot(sx, sz);
          if (sd >= CFG.chickMinSep) continue;
          if (sd < 1e-4) {
            // 完全重合：沿母鸡右侧方向推开（确定性，不用随机）
            sx = -henFz; sz = henFx;
          } else {
            sx /= sd; sz /= sd;
          }
          let push = (CFG.chickMinSep - sd) * 0.5;
          if (push > maxCorr) push = maxCorr;
          pbdPos[i].x -= sx * push; pbdPos[i].z -= sz * push;
          pbdPos[j].x += sx * push; pbdPos[j].z += sz * push;
        }
      }

      // e. 子步速度阻尼（每子步乘一次，照 ChickChain.cs 在子步循环内施加）。
      //    注意：每物理步的有效阻尼 = chainDamping^chainSubsteps（默认 0.96^3 ≈ 0.885），
      //    面板标签已注明"每子步"，不要挪到子步循环外（会偏离参考手感）。
      for (let i = 0; i < n; i++) {
        chicks[i].vel.x *= CFG.chainDamping;
        chicks[i].vel.z *= CFG.chainDamping;
      }
    }

    // ── 写回位置（钳制场地内）──
    for (let i = 0; i < n; i++) {
      pbdPos[i].y = 0;
      clampToArena(pbdPos[i], 0.3);
      chicks[i].pos.copy(pbdPos[i]);
    }
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [脱链 / 重连 / 脱链小鸡回家 AI]（ChickChain.cs DetachFrom / ReattachToTail / Chick.cs 脱链段）
  // 脱链小鸡从 chicks 移到 detached，自己全速跑回当前队尾，距离 < regrabRadius 自动重连。
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  // 当前链条队尾位置（脱链小鸡回家目标）：链空则母鸡身后
  function tailPosition(out) {
    if (chicks.length > 0) { out.copy(chicks[chicks.length - 1].pos); return out; }
    out.set(hen.pos.x - hen.forward.x * CFG.chickSpacing, 0, hen.pos.z - hen.forward.z * CFG.chickSpacing);
    return out;
  }

  // 从 breakIndex 到队尾整段脱链
  function detachFrom(breakIndex) {
    for (let i = breakIndex; i < chicks.length; i++) {
      const c = chicks[i];
      c.detached = true;
      c.overload = 0;
      detached.push(c);
      // 脱链染警戒橙
      c.mesh.userData.body.material = mat(0xff8c33);
    }
    chicks.length = breakIndex;
    for (let k = 0; k < chicks.length; k++) chicks[k].index = k;
    refreshChickMarker();   // 队尾可能变了
    showToast('🔗 链断了！脱链小鸡快跑回队尾');
    sfxPop();               // 脱链 pop（M3）
    flashWhite(0.18);       // 断点闪白（M3）
    screenShake(0.35, 0.18);// 轻微屏震（M3）
  }

  // 把脱链小鸡接回队尾
  function reattachToTail(c) {
    const di = detached.indexOf(c);
    if (di >= 0) detached.splice(di, 1);
    c.detached = false;
    c.reattachCd = 1.0;     // 1 秒保护期
    c.index = chicks.length;
    chicks.push(c);
    c.mesh.userData.body.material = mat(c.mesh.userData.baseColor);
    refreshChickMarker();
    sfxClick();             // 重连 click（M3）
    spawnHeart(c);          // 小鸡头顶 ❤ 一闪（M3）
  }

  const _tailPos = new THREE.Vector3();
  // 脱链小鸡每物理步：全速跑回队尾（玩家小鸡可用 playerSteer 绕路），并推进蹲下/重连计时
  function detachedStep(dt) {
    for (let k = detached.length - 1; k >= 0; k--) {
      const c = detached[k];
      if (c.reattachCd > 0) c.reattachCd -= dt;
      // 蹲下推进（脱链也能蹲）
      if (c.crouchTimer > 0) { c.crouchTimer -= dt; if (c.crouchTimer <= 0) c.crouchCd = CFG.crouchCooldown; c.vel.set(0,0,0); continue; }
      if (c.crouchCd > 0) c.crouchCd -= dt;
      tailPosition(_tailPos);
      let hx = _tailPos.x - c.pos.x, hz = _tailPos.z - c.pos.z;
      const hl = Math.hypot(hx, hz);
      if (hl > 0.01) {
        hx /= hl; hz /= hl;
        // 玩家小鸡脱链时可用 playerSteer 绕路（目标仍是回家）
        if (c === controlledChick && c.playerSteer.lengthSq() > 0.01) {
          const w = CFG.chickSteerWeight;
          hx = lerp(hx, c.playerSteer.x, w); hz = lerp(hz, c.playerSteer.z, w);
          const nl = Math.hypot(hx, hz); if (nl > 1e-4) { hx /= nl; hz /= nl; }
        } else if (c !== controlledChick) {
          // AI 脱链：轻微绕开老鹰（evadeRadius 4）
          const edx = c.pos.x - eagle.pos.x, edz = c.pos.z - eagle.pos.z;
          const ed = Math.hypot(edx, edz);
          if (ed < CFG.chickEvadeRadius && ed > 0.01) {
            const a = (1 - ed / CFG.chickEvadeRadius) * 0.6;
            hx += edx / ed * a; hz += edz / ed * a;
            const nl = Math.hypot(hx, hz); if (nl > 1e-4) { hx /= nl; hz /= nl; }
          }
        }
        c.vel.set(hx * CFG.detachedChickSpeed, 0, hz * CFG.detachedChickSpeed);
        c.pos.x += c.vel.x * dt; c.pos.z += c.vel.z * dt;
        clampToArena(c.pos, 0.3);
      }
      // 重连检测
      tailPosition(_tailPos);
      if (Math.hypot(c.pos.x - _tailPos.x, c.pos.z - _tailPos.z) < CFG.regrabRadius) reattachToTail(c);
    }
  }

  // 链上小鸡计时 + 自动蹲下（Chick.cs FixedUpdate 计时段）。蹲下推进对所有链上小鸡跑，
  // 自动蹲下只对非玩家小鸡（玩家小鸡用技能键手动蹲，AI 用与玩家同冷却）。
  function chickTimersStep(dt) {
    for (const c of chicks) {
      if (c.reattachCd > 0) c.reattachCd -= dt;
      if (c.crouchTimer > 0) {
        c.crouchTimer -= dt;
        if (c.crouchTimer <= 0) { c.crouchCd = CFG.crouchCooldown; c.mesh.userData.body.material = mat(c.mesh.userData.baseColor); }
        continue;   // 蹲下中不触发新蹲下
      }
      if (c.crouchCd > 0) c.crouchCd -= dt;
      // 自动蹲下：老鹰冲刺逼近 crouchTriggerRadius 内且朝自己冲 → 蹲（AI 小鸡）
      if (c !== controlledChick && c.crouchCd <= 0) {
        const dx = c.pos.x - eagle.pos.x, dz = c.pos.z - eagle.pos.z;
        const d = Math.hypot(dx, dz);
        if (d < CFG.crouchTriggerRadius && eagle.dashTimer > 0) {
          // 老鹰速度朝向自己？dot(eagleVel, toMe)>0
          if (eagle.vel.x * dx + eagle.vel.z * dz > 0) startCrouch(c);
        }
      }
    }
  }

  // 触发一只小鸡蹲下（手动/自动共用）：染青色 + 计时
  function startCrouch(c) {
    c.crouchTimer = CFG.crouchDuration;
    c.mesh.userData.body.material = mat(0x5af0ff);
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [老鹰 AI] 三态机 ORBIT / ATTACK / RETREAT，M1 简版只制造压力
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const _eDesired = new THREE.Vector3();
  const _flockCenter = new THREE.Vector3();

  // 鸡群中心（母鸡 + 小鸡）水平
  function flockCenter(out) {
    let sx = hen.pos.x, sz = hen.pos.z, cnt = 1;
    for (const c of chicks) { sx += c.pos.x; sz += c.pos.z; cnt++; }
    out.set(sx / cnt, 0, sz / cnt);
    return out;
  }
  // 队尾小鸡（最后一只）
  function tailChick() { return chicks.length ? chicks[chicks.length - 1] : null; }

  // 老鹰当前目标：脱链小鸡优先 > 队尾（EagleAutoPilot.FindBestTarget + 调研指令 #10 心跳指针）
  function eagleTarget() {
    // 脱链小鸡优先（最近）
    let best = null, bestD = Infinity;
    for (const c of detached) {
      const d = (c.pos.x - eagle.pos.x) ** 2 + (c.pos.z - eagle.pos.z) ** 2;
      if (d < bestD) { bestD = d; best = c; }
    }
    if (best) return best;
    // 否则队尾（被母鸡掩护时加距离惩罚，换软柿子——这里只有一条链，退化为队尾）
    return tailChick();
  }

  // 冲刺时机判定：目标在前方锥角内且距离 < 6（题面要求）
  function dashWindowOk(target) {
    if (!target) return false;
    const dx = target.pos.x - eagle.pos.x, dz = target.pos.z - eagle.pos.z;
    const d = Math.hypot(dx, dz);
    if (d > 6 || d < 0.01) return false;
    // 前方锥角：dot(forward, toTarget) > cos(50°)
    const dot = (eagle.forward.x * dx + eagle.forward.z * dz) / d;
    return dot > 0.64;
  }

  // 老鹰尝试冲刺（先 0.3s 蓄力前摇，调研指令 #1）。键盘/AI 共用。
  function eagleTryDash() {
    if (eagle.dashCharge > 0 || eagle.dashTimer > 0 || eagle.dashCooldown > 0 || eagle.staggerTimer > 0) return;
    eagle.dashCharge = 0.3;   // 低头蓄力 0.3s，期间速度 0
  }

  const _eToTarget = new THREE.Vector3();
  const _maneuverDir = new THREE.Vector3();

  function eagleStep(dt) {
    // 计时递减
    if (eagle.dashCooldown > 0) eagle.dashCooldown -= dt;
    if (eagle.dashTimer > 0) {
      const was = eagle.dashTimer;
      eagle.dashTimer -= dt;
      // 冲刺自然结束且没抓到、没撞墙弹开 → 短翻滚收尾（调研指令 #5：扑空 ragdoll，0.8s）
      if (was > 0 && eagle.dashTimer <= 0 && eagle.staggerTimer <= 0 && !eagle.dashGotCatch) {
        eagle.rollTimer = 0.8; sfxThud();
      }
    }
    if (eagle.catchCd > 0) eagle.catchCd -= dt;
    if (eagle.staggerTimer > 0) eagle.staggerTimer -= dt;
    if (eagle.rollTimer > 0) eagle.rollTimer -= dt;

    // 蓄力前摇：满 0.3s 后真正起冲（调研指令 #1）
    if (eagle.dashCharge > 0) {
      eagle.dashCharge -= dt;
      if (eagle.dashCharge <= 0) {
        eagle.dashCharge = 0;
        eagle.dashTimer = CFG.dashDuration;
        eagle.dashCooldown = CFG.dashCooldown;
        eagle.dashGotCatch = false;   // 本次冲刺尚未抓到（用于扑空翻滚判定）
        sfxDive();                    // 俯冲风声（起冲瞬间，M3）
      }
    }

    let speedMul = 1.0;
    let targetY = 1.6 + Math.sin(performance.now() * 0.002) * 0.15; // 轻微浮动
    _eDesired.set(0, 0, 0);

    // 僵直 / 翻滚 / 蓄力期间：定身（输入/AI 无效，被弹开/吞咽/翻滚）
    const frozen = eagle.staggerTimer > 0 || eagle.rollTimer > 0 || eagle.dashCharge > 0;

    if (playerRole === ROLE.EAGLE) {
      // ── 玩家老鹰 ──
      if (!frozen) {
        readInput(inputDir, dt);
        _eDesired.set(inputDir.x * CFG.eagleSpeed, 0, inputDir.z * CFG.eagleSpeed);
      }
      if (eagle.dashTimer > 0) { speedMul = CFG.dashMultiplier; targetY = 0.7; }
    } else {
      // ── AI 老鹰（EagleAutoPilot 三态 + 僵局破局机动）──
      if (!frozen) eagleAIStep(dt, (mul, ty) => { speedMul = mul; if (ty != null) targetY = ty; });
      if (eagle.dashTimer > 0) { speedMul = CFG.dashMultiplier; targetY = 0.7; }
    }

    // 蓄力期间机头低垂、速度归零
    if (eagle.dashCharge > 0) { _eDesired.set(0, 0, 0); speedMul = 0; targetY = 0.9; }
    if (eagle.rollTimer > 0) { _eDesired.set(0, 0, 0); targetY = 0.3; }      // 扑空翻滚：贴地不动
    if (eagle.staggerTimer > 0) { _eDesired.set(0, 0, 0); targetY = 1.4; }    // 弹开僵直

    // 速度 MoveTowards 加速
    _eDesired.multiplyScalar(speedMul);
    moveTowards(eagle.vel, eagle.vel, _eDesired, CFG.eagleAccel * Math.max(1, speedMul) * dt);
    if (frozen) { eagle.vel.x *= 0.8; eagle.vel.z *= 0.8; }  // 定身时速度快速衰减
    eagle.pos.x += eagle.vel.x * dt;
    eagle.pos.z += eagle.vel.z * dt;
    clampToArena(eagle.pos, 0.5);

    // 高度平滑趋近 targetY
    eagle.targetY = targetY;
    eagle.pos.y += (eagle.targetY - eagle.pos.y) * smoothFactor(6, dt);

    // 朝向 = 速度方向
    if (eagle.vel.lengthSq() > 0.04 && eagle.dashCharge <= 0) {
      const ty = Math.atan2(eagle.vel.x, eagle.vel.z);
      eagle.yaw = turnTowardsAngle(eagle.yaw, ty, 360, dt);
    }
    eagle.forward.set(Math.sin(eagle.yaw), 0, Math.cos(eagle.yaw));

    // ── 翅膀=真墙：水平推出 + 冲刺撞翅膀弹开僵直（核心，第3条要求）──
    resolveWingWall(dt);

    // ── 抓捕 / near-miss 判定（统一规则：必须冲刺中触碰才算抓）──
    eagleCatchCheck(dt);
  }

  // 老鹰 AI：照 EagleAutoPilot 三态 + 僵局破局，目标优先脱链小鸡。
  // applySpeed(mul, targetY) 回调让外层应用冲刺速度/高度。
  function eagleAIStep(dt, applySpeed) {
    eagle.rescanTimer -= dt;
    let target = eagle.target;
    // 目标失效或定期重选
    if (!target || target.detached === undefined || eagle.rescanTimer <= 0 ||
        (chicks.indexOf(target) < 0 && detached.indexOf(target) < 0)) {
      const newT = eagleTarget();
      if (newT !== eagle.target) {
        eagle.bestDist = newT ? Math.hypot(newT.pos.x - eagle.pos.x, newT.pos.z - eagle.pos.z) + 1 : Infinity;
        eagle.stuckTimer = 0;
        eagle.flankSign = -eagle.flankSign;
      }
      eagle.target = newT;
      eagle.rescanTimer = 1.5;
      target = newT;
    }
    if (!target) { _eDesired.set(0, 0, 0); return; }

    _eToTarget.set(target.pos.x - eagle.pos.x, 0, target.pos.z - eagle.pos.z);
    const dist = _eToTarget.length();
    const dirx = dist > 0.01 ? _eToTarget.x / dist : 0, dirz = dist > 0.01 ? _eToTarget.z / dist : 0;

    // 僵局检测
    if (dist < eagle.bestDist - 0.4) { eagle.bestDist = dist; eagle.stuckTimer = 0; }
    else eagle.stuckTimer += dt;

    if (eagle.maneuver !== 0) {
      runManeuver(dt, dist, dirx, dirz);
    } else if (eagle.stuckTimer > 3.0) {
      startManeuver();
    } else {
      // 正常追击 + 母鸡绕侧
      let mx = dirx, mz = dirz;
      const av = applyFlank(mx, mz, dirx, dirz);
      mx = av.x; mz = av.z;
      _eDesired.set(mx * CFG.eagleSpeed, 0, mz * CFG.eagleSpeed);
      if (dashWindowOk(target)) eagleTryDash();
    }
  }

  // 母鸡挡路时横向绕侧（_flankSign 交替防固定圆轨）
  const _flankTmp = { x: 0, z: 0 };
  function applyFlank(mx, mz, dirx, dirz) {
    const thx = hen.pos.x - eagle.pos.x, thz = hen.pos.z - eagle.pos.z;
    const thl = Math.hypot(thx, thz);
    if (thl > 0.01) {
      const dot = (thx / thl) * dirx + (thz / thl) * dirz;
      if (dot > 0.5 && thl < 2.5) {
        // flank = cross(up, dir) * sign
        const fx = dirz * eagle.flankSign, fz = -dirx * eagle.flankSign;
        mx = dirx + fx * 1.2; mz = dirz + fz * 1.2;
        const ml = Math.hypot(mx, mz); if (ml > 1e-4) { mx /= ml; mz /= ml; }
      }
    }
    _flankTmp.x = mx; _flankTmp.z = mz; return _flankTmp;
  }

  function startManeuver() {
    eagle.flankSign = -eagle.flankSign;
    eagle.maneuver = Math.random() < 0.5 ? 1 : 2;   // 1=强攻 2=绕后
    eagle.maneuverTimer = 0;
    eagle.maneuverCommit = false;
    eagle.stuckTimer = 0;
    if (eagle.maneuver === 2) calcFlankBehind(eagle.maneuverPoint);
  }

  function runManeuver(dt, dist, dirx, dirz) {
    eagle.maneuverTimer += dt;
    if (eagle.maneuver === 1) {
      // 强攻：直线冲，激进触发冲刺（佯攻反向已含在交替 flankSign）
      _eDesired.set(dirx * CFG.eagleSpeed, 0, dirz * CFG.eagleSpeed);
      if (dist < 4.5) eagleTryDash();
      if (eagle.maneuverTimer >= 2.0) endManeuver();
    } else {
      // 绕后
      if (eagle.maneuverCommit) {
        _eDesired.set(dirx * CFG.eagleSpeed, 0, dirz * CFG.eagleSpeed);
        if (dist < 4.5) eagleTryDash();
        if (eagle.maneuverTimer >= 1.2) endManeuver();
        return;
      }
      if (eagle.maneuverTimer >= 3.0) { eagle.maneuverCommit = true; eagle.maneuverTimer = 0; return; }
      calcFlankBehind(eagle.maneuverPoint);
      let px = eagle.maneuverPoint.x - eagle.pos.x, pz = eagle.maneuverPoint.z - eagle.pos.z;
      const pl = Math.hypot(px, pz);
      if (pl < 1.5) { eagle.maneuverCommit = true; eagle.maneuverTimer = 0; return; }
      px /= pl; pz /= pl;
      const av = applyFlank(px, pz, px, pz);
      _eDesired.set(av.x * CFG.eagleSpeed, 0, av.z * CFG.eagleSpeed);
    }
  }

  function endManeuver() {
    eagle.maneuver = 0; eagle.maneuverTimer = 0; eagle.maneuverCommit = false;
    eagle.stuckTimer = 0; eagle.flankSign = -eagle.flankSign;
    eagle.rescanTimer = 0;   // 强制重选目标
  }

  // 绕后机动点：目标 + 沿"母鸡→目标"方向偏出 7m（绕到母鸡背面）
  function calcFlankBehind(out) {
    const t = eagle.target; if (!t) { out.copy(eagle.pos); return; }
    let ax = t.pos.x - hen.pos.x, az = t.pos.z - hen.pos.z;
    const al = Math.hypot(ax, az);
    if (al > 0.01) { ax /= al; az /= al; } else { ax = 1; az = 0; }
    out.set(t.pos.x + ax * 7, 0, t.pos.z + az * 7);
    clampToArena(out, 1.5);
  }

  // ── 抓捕 / near-miss：扫所有小鸡（链上 + 脱链），冲刺中触碰 < CATCH_RADIUS 且未蹲 = 真抓 ──
  let nearMissCd = 0;
  const _allChicks = [];   // 链上+脱链合并的复用数组（热路径每物理步调用，避免 concat 造 GC）
  function eagleCatchCheck(dt) {
    if (nearMissCd > 0) nearMissCd -= dt;
    if (eagle.dashTimer <= 0) return;            // 统一规则：必须冲刺中
    if (eagle.catchCd > 0) return;               // 抓捕冷却
    // 先扫 near-miss（擦过但没抓到 → 慢动作 + 心跳，调研指令 #2）
    let caughtOne = false;
    _allChicks.length = 0;
    for (const c of chicks) _allChicks.push(c);
    for (const c of detached) _allChicks.push(c);
    const all = _allChicks;
    for (const c of all) {
      const d = Math.hypot(c.pos.x - eagle.pos.x, c.pos.z - eagle.pos.z);
      if (d < CATCH_RADIUS) {
        if (c.crouchTimer > 0) continue;         // 蹲下免抓
        if (isShieldedByHen(c)) continue;        // 母鸡身体挡住的小鸡不算
        doCatch(c);
        caughtOne = true;
        break;
      }
    }
    if (!caughtOne && nearMissCd <= 0) {
      for (const c of all) {
        if (c.crouchTimer > 0) continue;
        const d = Math.hypot(c.pos.x - eagle.pos.x, c.pos.z - eagle.pos.z);
        if (d < NEAR_MISS_RADIUS) { triggerNearMiss(c); nearMissCd = 1.5; break; }
      }
    }
  }

  // 真抓：移除小鸡 + 计数 + 链重排 + 弹开僵直 + 胜负判定
  const _shieldA = new THREE.Vector3(), _shieldB = new THREE.Vector3();
  function doCatch(c) {
    eagle.catchCd = CFG.catchCooldown;
    eagle.dashGotCatch = true;
    stats.caught++;
    // 从链上或脱链列表移除
    let i = chicks.indexOf(c);
    if (i >= 0) {
      chicks.splice(i, 1);
      for (let k = 0; k < chicks.length; k++) chicks[k].index = k;
    } else {
      i = detached.indexOf(c);
      if (i >= 0) detached.splice(i, 1);
    }
    scene.remove(c.mesh);
    const wasControlled = (c === controlledChick);
    refreshChickMarker();   // 玩家小鸡被抓 → 队尾白帽迁移到新队尾
    // 玩家扮小鸡且被抓的正是受控小鸡：把 controlled 指针迁到新队尾，否则相机会冻结在被抓坐标。
    // refreshChickMarker 在 buildChicks 阶段会先于 controlled 声明运行，所以这步放在 doCatch 里而非其内部。
    if (wasControlled && playerRole === ROLE.CHICK) {
      const prev = controlled;
      controlled = controlledChick || hen;
      // fps 下同步 mesh 可见性：旧受控已被 scene.remove（恢复 visible 无副作用），隐藏新受控自身
      if (camMode === 'fps' && controlled !== prev) {
        if (prev && prev.mesh) prev.mesh.visible = true;
        controlled.mesh.visible = false;
      }
    }
    spawnStars(c.pos.x, c.pos.y + 0.4, c.pos.z, 0xffe14d);
    spawnFeathers(c.pos.x, c.pos.y + 0.35, c.pos.z, 0xffe14d);  // 方块羽毛爆开（M3）
    timeScale = 0.3; timeScaleTimer = 0.3;                       // 0.3s 慢动作（M3）
    sfxCatch();
    showToast('🪶 老鹰叼走一只！(' + stats.caught + '/' + CFG.catchesToWin + ')');
    // 得手"吞咽"僵直（被弹开 0.9s）
    eagle.staggerTimer = CFG.catchStagger;
    eagle.dashTimer = 0;
    updateScoreHud();
    // 胜负
    if (stats.caught >= CFG.catchesToWin || (chicks.length + detached.length) === 0) endRound('eagle');
  }

  // 母鸡身体挡在老鹰↔小鸡连线上 → 不算抓（IsShieldedByHen 的简化：胶囊近似）
  function isShieldedByHen(c) {
    _shieldA.set(eagle.pos.x, 0, eagle.pos.z);
    _shieldB.set(c.pos.x, 0, c.pos.z);
    const dx = _shieldB.x - _shieldA.x, dz = _shieldB.z - _shieldA.z;
    const len2 = dx * dx + dz * dz;
    if (len2 < 0.01) return false;
    // 母鸡圆心到线段最近距离 < 母鸡半径 0.65 → 被挡
    let t = ((hen.pos.x - _shieldA.x) * dx + (hen.pos.z - _shieldA.z) * dz) / len2;
    t = clamp(t, 0, 1);
    const cx = _shieldA.x + dx * t, cz = _shieldA.z + dz * t;
    return Math.hypot(hen.pos.x - cx, hen.pos.z - cz) < 0.65;
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [翅膀=真墙]（第3条核心 / 翻译"翅膀是会走的墙"）：母鸡为中心、垂直朝向的横向挡板，
  // 宽 = hen.wingSpan（开/收切换）。老鹰水平位置每步对挡板线段碰撞解算推出去；
  // 老鹰**冲刺中**撞翅膀 → 弹开 + 僵直（扑空惩罚，给母鸡正反馈）。母鸡↔自家小鸡永远无碰撞。
  // 注：调研指令 #4 想要"推力场而非硬盾"，但 Max 第3条明确点名"翅膀是真墙/硬碰撞解算"，
  //    以 Max 指令为准（硬墙），不做软推力场——在返回里说明取舍。
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const EAGLE_RADIUS = 0.55;   // 老鹰水平碰撞半径
  const WING_THICK = 0.35;     // 挡板厚度（沿朝向）
  function resolveWingWall(dt) {
    // 挡板线段：母鸡中心，沿"母鸡右手"轴展开 ±halfSpan，位于母鸡身前一点点（贴身体）
    const halfSpan = hen.wingSpan * 0.5;
    const rx = Math.cos(hen.yaw), rz = -Math.sin(hen.yaw);   // 母鸡右手向量（与 forward 垂直）
    // 板中心 = 母鸡位置（横在身体上）
    const cx = hen.pos.x, cz = hen.pos.z;
    // 老鹰相对板中心
    const ex = eagle.pos.x - cx, ez = eagle.pos.z - cz;
    // 沿右手轴（板长方向）的投影 u，沿 forward 轴（板法线）的投影 v
    const u = ex * rx + ez * rz;
    const v = ex * hen.forward.x + ez * hen.forward.z;
    // 在板长范围内（带老鹰半径余量）才解算
    const uClamped = clamp(u, -halfSpan, halfSpan);
    const inSpan = Math.abs(u) <= halfSpan + EAGLE_RADIUS;
    const penetration = (WING_THICK * 0.5 + EAGLE_RADIUS) - Math.abs(v);
    if (inSpan && penetration > 0 && Math.abs(u) <= halfSpan + EAGLE_RADIUS) {
      // 推出到板的最近一侧（沿 forward 法线方向）
      const sign = v >= 0 ? 1 : -1;
      const pushX = hen.forward.x * sign * penetration;
      const pushZ = hen.forward.z * sign * penetration;
      eagle.pos.x += pushX; eagle.pos.z += pushZ;
      // 消掉穿入方向的速度分量（不许继续往板里钻）
      const vn = eagle.vel.x * hen.forward.x + eagle.vel.z * hen.forward.z;
      if (vn * sign < 0) { eagle.vel.x -= hen.forward.x * vn; eagle.vel.z -= hen.forward.z * vn; }
      // 冲刺中撞墙 → 弹开 + 僵直 0.9s（扑空惩罚）
      if (eagle.dashTimer > 0 && eagle.staggerTimer <= 0) {
        eagle.dashTimer = 0;
        eagle.staggerTimer = 0.9;
        // 反弹速度
        eagle.vel.x = hen.forward.x * sign * 6; eagle.vel.z = hen.forward.z * sign * 6;
        spawnStars(eagle.pos.x, eagle.pos.y, eagle.pos.z, 0xffffff);
        sfxThud();
        showToast('🛡️ 翅膀挡住了！老鹰扑空');
      }
    }
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [母鸡 AI]（HenAI.cs）：卡在老鹰与队尾连线上拦截；近 7 张翅（迟滞+2）；有脱链优先护
  //  脱链小鸡-老鹰连线；威胁远时随机遛弯不傻站。AI 写 hen.vel / hen.pos / hen.yaw / wingOpen。
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const _protect = new THREE.Vector3(), _guard = new THREE.Vector3(), _chainHead = new THREE.Vector3();
  function chainCenter(out) {
    if (chicks.length === 0) { out.set(hen.pos.x - hen.forward.x * CFG.chickSpacing * 2, 0, hen.pos.z - hen.forward.z * CFG.chickSpacing * 2); return out; }
    let sx = 0, sz = 0; for (const c of chicks) { sx += c.pos.x; sz += c.pos.z; }
    out.set(sx / chicks.length, 0, sz / chicks.length); return out;
  }
  function nearestDetached(out) {
    let best = null, bd = Infinity;
    for (const c of detached) { const d = (c.pos.x - hen.pos.x) ** 2 + (c.pos.z - hen.pos.z) ** 2; if (d < bd) { bd = d; best = c; } }
    if (best) out.copy(best.pos); else out.set(hen.pos.x, 0, hen.pos.z);
    return out;
  }

  function henAIStep(dt) {
    if (hen.staggerTimer > 0) { hen.vel.x *= 0.8; hen.vel.z *= 0.8; hen.pos.x += hen.vel.x * dt; hen.pos.z += hen.vel.z * dt; return; }
    const hasDetached = detached.length > 0;

    // ---- 翅膀开合决策（迟滞防抖；有脱链强制张开）----
    const planeDist = Math.hypot(eagle.pos.x - hen.pos.x, eagle.pos.z - hen.pos.z);
    if (hasDetached) hen.wingOpen = true;
    else if (planeDist < CFG.henWingOpenRange) hen.wingOpen = true;
    else if (planeDist > CFG.henWingOpenRange + 2) hen.wingOpen = false;
    // 迟滞区间保持上次状态

    // 守护点 = 链中心
    chainCenter(_protect);
    let thx = eagle.pos.x - _protect.x, thz = eagle.pos.z - _protect.z;
    const thMag = Math.hypot(thx, thz);
    const threatDirX = thMag > 0.1 ? thx / thMag : hen.forward.x;
    const threatDirZ = thMag > 0.1 ? thz / thMag : hen.forward.z;
    // 威胁门控 engage = clamp01(2 - 2*threat/engageRange)
    const engage = clamp01(2 - 2 * thMag / Math.max(1, CFG.henEngageRange));

    let goalX, goalZ, faceEagle, speedScale = 1;
    const standoff = 2.2;

    if (hasDetached) {
      // 优先去挡老鹰↔最近脱链小鸡连线
      nearestDetached(_chainHead);
      let bx = _chainHead.x - eagle.pos.x, bz = _chainHead.z - eagle.pos.z;
      const bl = Math.hypot(bx, bz);
      const blockX = bl > 0.1 ? bx / bl : threatDirX, blockZ = bl > 0.1 ? bz / bl : threatDirZ;
      const passiveX = _chainHead.x - blockX * CFG.henBlockDistance, passiveZ = _chainHead.z - blockZ * CFG.henBlockDistance;
      const activeX = eagle.pos.x + blockX * standoff, activeZ = eagle.pos.z + blockZ * standoff;
      const t = CFG.henAggression * engage;
      goalX = lerp(passiveX, activeX, t); goalZ = lerp(passiveZ, activeZ, t);
      faceEagle = true;
    } else {
      // 卡位拦截目标
      const passiveX = _protect.x + threatDirX * CFG.henBlockDistance, passiveZ = _protect.z + threatDirZ * CFG.henBlockDistance;
      const activeX = eagle.pos.x - threatDirX * standoff, activeZ = eagle.pos.z - threatDirZ * standoff;
      const t = CFG.henAggression * engage;
      const guardX = lerp(passiveX, activeX, t), guardZ = lerp(passiveZ, activeZ, t);
      // 遛弯目标
      if (!hen.wanderInit) { pickWander(); hen.wanderInit = true; }
      hen.wanderTimer -= dt;
      if (hen.wanderTimer <= 0 || Math.hypot(hen.pos.x - hen.wanderTarget.x, hen.pos.z - hen.wanderTarget.z) < 2) pickWander();
      // engage 插值：完全卡位 ↔ 完全遛弯
      goalX = lerp(hen.wanderTarget.x, guardX, engage);
      goalZ = lerp(hen.wanderTarget.z, guardZ, engage);
      faceEagle = engage > 0.5;
      speedScale = lerp(0.6, 1, engage);   // 遛弯慢
    }
    // standoff 兜底：别贴到老鹰身上
    {
      const fx = goalX - eagle.pos.x, fz = goalZ - eagle.pos.z, fl = Math.hypot(fx, fz);
      if (fl < standoff) { goalX = eagle.pos.x + (fl > 0.01 ? fx / fl : -threatDirX) * standoff; goalZ = eagle.pos.z + (fl > 0.01 ? fz / fl : -threatDirZ) * standoff; }
    }
    // 钳到场地
    goalX = clamp(goalX, -CFG.arenaWidth / 2 + 1.2, CFG.arenaWidth / 2 - 1.2);
    goalZ = clamp(goalZ, -CFG.arenaDepth / 2 + 1.2, CFG.arenaDepth / 2 - 1.2);

    // 移动（翅膀移速倍率 × 遛弯减速）
    const wingMult = lerp(CFG.henWingClosedSpeedMult, CFG.henWingOpenSpeedMult, hen.wingT);
    let toX = goalX - hen.pos.x, toZ = goalZ - hen.pos.z;
    const toLen = Math.hypot(toX, toZ);
    const arrive = Math.min(CFG.henSpeed * wingMult * speedScale, toLen * 4);
    const desX = toLen > 0.01 ? toX / toLen * arrive : 0, desZ = toLen > 0.01 ? toZ / toLen * arrive : 0;
    _tmpDesired.set(desX, 0, desZ);
    moveTowards(hen.vel, hen.vel, _tmpDesired, 30 * dt);
    hen.pos.x += hen.vel.x * dt; hen.pos.z += hen.vel.z * dt;
    clampToArena(hen.pos, 1.0);
    // 朝向
    let faceX, faceZ;
    if (faceEagle) { faceX = eagle.pos.x - hen.pos.x; faceZ = eagle.pos.z - hen.pos.z; }
    else { faceX = hen.vel.x; faceZ = hen.vel.z; }
    if (faceX * faceX + faceZ * faceZ > 0.01) {
      const targetYaw = Math.atan2(faceX, faceZ);
      hen.yaw = turnTowardsAngle(hen.yaw, targetYaw, CFG.henTurnSpeed, dt);
    }
    hen.forward.set(Math.sin(hen.yaw), 0, Math.cos(hen.yaw));
  }

  function pickWander() {
    const hx = CFG.arenaWidth / 2 - 3, hz = CFG.arenaDepth / 2 - 3;
    const a = Math.random() * Math.PI * 2, r = Math.sqrt(Math.random());
    hen.wanderTarget.set(Math.cos(a) * r * hx, 0, Math.sin(a) * r * hz);
    hen.wanderTimer = CFG.henWanderInterval;
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [技能分派]（统一空格 / 触屏大按钮触发，按受控角色走）
  //  老鹰=冲刺扑击（蓄力前摇）；母鸡=翅膀开/收切换；小鸡=紧急蹲下 1s 冷却 10s。
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function triggerSkill() {
    if (playerRole === ROLE.EAGLE) {
      eagleTryDash();
    } else if (playerRole === ROLE.HEN) {
      hen.wingOpen = !hen.wingOpen;   // 开/收切换（动画 0.25s）
    } else if (playerRole === ROLE.CHICK) {
      const c = controlledChick;
      if (c && c.crouchTimer <= 0 && c.crouchCd <= 0) { startCrouch(c); }
    }
  }

  // 技能就绪/冷却进度（0=就绪，1=刚用完）+ 名称，供 HUD 显示
  function skillInfo() {
    if (playerRole === ROLE.EAGLE) {
      const cd = CFG.dashCooldown > 0 ? clamp01(eagle.dashCooldown / CFG.dashCooldown) : 0;
      const active = eagle.dashTimer > 0 || eagle.dashCharge > 0;
      return { name: '⚡ 冲刺扑击', sub: '空格', cd, active, ready: cd <= 0 && !active };
    }
    if (playerRole === ROLE.HEN) {
      return { name: hen.wingOpen ? '🪽 收翅(快)' : '🪽 张翅(墙)', sub: '空格切换', cd: 0, active: hen.wingT > 0.05 && hen.wingT < 0.95, ready: true };
    }
    // 小鸡
    const c = controlledChick;
    const cd = c && CFG.crouchCooldown > 0 ? clamp01(c.crouchCd / CFG.crouchCooldown) : 0;
    const active = !!(c && c.crouchTimer > 0);
    return { name: '🛡️ 紧急蹲下', sub: '空格', cd, active, ready: cd <= 0 && !active };
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [流程：选角 / 开局 / 结算 / 重置]
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const overlayEl = () => document.getElementById('overlay');

  // 选角：设角色 → 接线（controlled 指向，AI 补位）→ 进 READY 待机
  function selectRole(role) {
    playerRole = role;
    rebuildRound();          // 重排角色与链
    // 受控引用
    if (role === ROLE.EAGLE) controlled = eagle;
    else if (role === ROLE.HEN) controlled = hen;
    else { refreshChickMarker(); controlled = controlledChick || hen; }
    // fps 隐藏自身（若当前在 fps）
    if (camMode === 'fps') { hen.mesh.visible = true; eagle.mesh.visible = true; controlled.mesh.visible = false; }
    camYaw = controlled.yaw; followInit = false;
    phase = PHASE.READY;
    // overlay 切到待机页
    document.getElementById('ov-roleselect').style.display = 'none';
    document.getElementById('ov-settle').style.display = 'none';
    document.getElementById('ov-ready').style.display = '';
    document.getElementById('ov-title').textContent = '准备好了吗？';
    const names = { 0: '🦅 老鹰', 1: '🐔 母鸡', 2: '🐤 队尾小鸡' };
    document.getElementById('ready-role').textContent = '你扮演：' + names[role];
    updateScoreHud();
    updateSkillLabels();
    audioInit();
  }

  // 开局：READY → RUNNING，隐藏 overlay，开计时
  function beginRound() {
    phase = PHASE.RUNNING;
    timeLeft = CFG.roundSeconds;
    lastTickSec = -1;          // 重置滴答（M3）
    showTutorial();            // 开局操作提示（M3，按角色，5s 淡出）
    overlayEl().classList.add('hide');
  }

  // 结算：RUNNING → SETTLE
  function endRound(who) {
    if (phase === PHASE.SETTLE) return;
    phase = PHASE.SETTLE;
    winner = who;
    const playerWon = (who === 'eagle' && playerRole === ROLE.EAGLE) || (who === 'flock' && playerRole !== ROLE.EAGLE);
    const aliveChicks = chicks.length + detached.length;
    const big = document.getElementById('settle-big');
    big.textContent = playerWon ? '🎉 胜利！' : '💥 失败…';
    big.className = 'win-big ' + (playerWon ? 'win' : 'lose');
    const whoText = who === 'eagle' ? '🦅 老鹰抓满 ' + CFG.catchesToWin + ' 只，获胜' : '🐔 鸡队撑过 90 秒，获胜';
    document.getElementById('settle-stats').innerHTML =
      whoText + '<br>本局：被抓 <b>' + stats.caught + '</b> 只 · 存活 <b>' + aliveChicks + '</b> 只';
    document.getElementById('ov-title').textContent = '🐔 老鹰抓小鸡 · 方块版';
    document.getElementById('ov-ready').style.display = 'none';
    document.getElementById('ov-roleselect').style.display = 'none';
    document.getElementById('ov-settle').style.display = '';
    overlayEl().classList.remove('hide');
    if (playerWon) sfxWin(); else sfxLose();
  }

  // 重排一局（重建链、复位角色位置/状态）。selectRole 与"再来一局"共用。
  function rebuildRound() {
    // 复位母鸡
    hen.pos.set(-7, 0, 0); hen.vel.set(0, 0, 0); hen.yaw = Math.PI / 2;
    hen.forward.set(Math.sin(hen.yaw), 0, Math.cos(hen.yaw));
    hen.wingOpen = false; hen.wingT = 0; hen.wingSpan = CFG.henWingClosedSpan; hen.staggerTimer = 0;
    hen.wanderInit = false; hen.bob = 0;
    // 复位老鹰
    eagle.pos.set(12, 1.6, 0); eagle.vel.set(0, 0, 0); eagle.yaw = -Math.PI / 2;
    eagle.forward.set(Math.sin(eagle.yaw), 0, Math.cos(eagle.yaw));
    eagle.state = 'ORBIT'; eagle.orbitDir = 1; eagle.orbitAngle = 0;
    eagle.dashTimer = 0; eagle.dashCooldown = 0; eagle.dashCharge = 0;
    eagle.dashGotCatch = false;
    eagle.staggerTimer = 0; eagle.catchCd = 0; eagle.rollTimer = 0;
    eagle.target = null; eagle.maneuver = 0; eagle.stuckTimer = 0; eagle.bestDist = Infinity; eagle.rescanTimer = 0;
    eagle.mesh.rotation.set(0, eagle.yaw, 0);
    // 重建链
    buildChicks();
    // 统计
    stats.caught = 0; stats.startChicks = chicks.length;
    nearMissCd = 0; blindTimer = 0; timeScale = 1;
  }

  // "再来一局"：同角色重开 → READY
  function restartSameRole() {
    rebuildRound();
    if (playerRole === ROLE.EAGLE) controlled = eagle;
    else if (playerRole === ROLE.HEN) controlled = hen;
    else { refreshChickMarker(); controlled = controlledChick || hen; }
    if (camMode === 'fps') { hen.mesh.visible = true; eagle.mesh.visible = true; controlled.mesh.visible = false; }
    camYaw = controlled.yaw; followInit = false;
    phase = PHASE.READY;
    document.getElementById('ov-settle').style.display = 'none';
    document.getElementById('ov-ready').style.display = '';
    document.getElementById('ov-title').textContent = '准备好了吗？';
    updateScoreHud(); updateSkillLabels();
  }

  // "换角色"：回选角界面
  function backToRoleSelect() {
    phase = PHASE.ROLE_SELECT;
    rebuildRound();
    controlled = hen;
    if (camMode === 'fps') { hen.mesh.visible = true; eagle.mesh.visible = true; }
    document.getElementById('ov-settle').style.display = 'none';
    document.getElementById('ov-ready').style.display = 'none';
    document.getElementById('ov-roleselect').style.display = '';
    document.getElementById('ov-title').textContent = '🐔 老鹰抓小鸡 · 方块版';
    overlayEl().classList.remove('hide');
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [Juice：星星眩晕粒子 + near-miss 慢动作 + Web Audio 音效]（调研指令 #2/#5/#12）
  // 统一"星星眩晕"粒子做失控视觉语言；near-miss 慢动作用 timeScale 缩放物理推进。
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  let timeScale = 1;          // 全局时间缩放（near-miss 慢动作）
  let timeScaleTimer = 0;     // 慢动作剩余
  let blindTimer = 0;         // AI 老鹰被致盲剩余（调研指令 #10，致盲子技能保留接口）
  let lastTickSec = -1;       // 倒计时滴答：上次播音的整秒（M3，防同秒重播）

  // 星星粒子池（THREE.Points），一次性 burst，淡出
  const STAR_MAX = 120;
  const starGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(STAR_MAX * 3);
  const starVel = new Float32Array(STAR_MAX * 3);
  const starCol = new Float32Array(STAR_MAX * 3);   // 每粒子颜色（避免全局改色，不同 burst 各保留各自颜色）
  const starLife = new Float32Array(STAR_MAX);
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
  const starMat = new THREE.PointsMaterial({ size: 0.22, vertexColors: true, transparent: true, opacity: 0.95, depthWrite: false });
  const starPoints = new THREE.Points(starGeo, starMat);
  starPoints.frustumCulled = false;
  scene.add(starPoints);
  const _starColor = new THREE.Color();
  let starCursor = 0;
  function spawnStars(x, y, z, color) {
    _starColor.setHex(color);
    for (let k = 0; k < 14; k++) {
      const i = starCursor; starCursor = (starCursor + 1) % STAR_MAX;
      starPos[i * 3] = x; starPos[i * 3 + 1] = y; starPos[i * 3 + 2] = z;
      starCol[i * 3] = _starColor.r; starCol[i * 3 + 1] = _starColor.g; starCol[i * 3 + 2] = _starColor.b;
      const a = Math.random() * Math.PI * 2, sp = 1.5 + Math.random() * 2.5;
      starVel[i * 3] = Math.cos(a) * sp; starVel[i * 3 + 1] = 2 + Math.random() * 2.5; starVel[i * 3 + 2] = Math.sin(a) * sp;
      starLife[i] = 0.6 + Math.random() * 0.3;
    }
    starGeo.attributes.color.needsUpdate = true;
  }
  function updateStars(dt) {
    let anyAlive = false;
    for (let i = 0; i < STAR_MAX; i++) {
      if (starLife[i] > 0) {
        starLife[i] -= dt; anyAlive = true;
        starVel[i * 3 + 1] -= 9 * dt;   // 重力
        starPos[i * 3] += starVel[i * 3] * dt;
        starPos[i * 3 + 1] += starVel[i * 3 + 1] * dt;
        starPos[i * 3 + 2] += starVel[i * 3 + 2] * dt;
        if (starLife[i] <= 0) { starPos[i * 3 + 1] = -999; }   // 藏到地下
      } else {
        starPos[i * 3 + 1] = -999;
      }
    }
    if (anyAlive) starGeo.attributes.position.needsUpdate = true;
  }

  // ── 方块羽毛粒子池（M3 抓到爆开）：N 个小 BoxGeometry，对象池复用，抛物线散落 + 旋转 + 淡出 ──
  // 主循环零 new：mesh / 速度 / 角速度 全预建，spawn 只重置数据。
  const FEATHER_MAX = 48;
  const feathers = [];
  {
    const fgeo = new THREE.BoxGeometry(0.16, 0.05, 0.16);   // 扁方块羽毛片
    const fmat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 1 });
    // 每片单独 material（要各自淡出 opacity），但共用 geometry
    for (let i = 0; i < FEATHER_MAX; i++) {
      const m = new THREE.Mesh(fgeo, fmat.clone());
      m.castShadow = false; m.visible = false;
      scene.add(m);
      feathers.push({
        mesh: m, life: 0,
        vx: 0, vy: 0, vz: 0,        // 线速度
        rx: 0, ry: 0, rz: 0,        // 角速度
      });
    }
  }
  let featherCursor = 0;
  function spawnFeathers(x, y, z, color) {
    for (let k = 0; k < 12; k++) {
