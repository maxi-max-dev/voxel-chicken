      const f = feathers[featherCursor]; featherCursor = (featherCursor + 1) % FEATHER_MAX;
      f.mesh.material.color.setHex(color);
      f.mesh.material.opacity = 1;
      f.mesh.visible = true;
      f.mesh.position.set(x, y, z);
      f.mesh.rotation.set(Math.random() * 6.28, Math.random() * 6.28, Math.random() * 6.28);
      const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 3;
      f.vx = Math.cos(a) * sp; f.vy = 3 + Math.random() * 3.5; f.vz = Math.sin(a) * sp;
      f.rx = (Math.random() - 0.5) * 14; f.ry = (Math.random() - 0.5) * 14; f.rz = (Math.random() - 0.5) * 14;
      f.life = 0.8 + Math.random() * 0.4;
    }
  }
  function updateFeathers(dt) {
    for (let i = 0; i < FEATHER_MAX; i++) {
      const f = feathers[i];
      if (f.life <= 0) continue;
      f.life -= dt;
      if (f.life <= 0) { f.mesh.visible = false; continue; }
      f.vy -= 12 * dt;                        // 重力
      const p = f.mesh.position;
      p.x += f.vx * dt; p.y += f.vy * dt; p.z += f.vz * dt;
      if (p.y < 0.05) { p.y = 0.05; f.vy *= -0.35; f.vx *= 0.6; f.vz *= 0.6; }  // 落地小弹
      f.mesh.rotation.x += f.rx * dt; f.mesh.rotation.y += f.ry * dt; f.mesh.rotation.z += f.rz * dt;
      if (f.life < 0.35) f.mesh.material.opacity = f.life / 0.35;   // 末段淡出
    }
  }

  // ── 头顶 ❤ 弹出池（M3 重连）：复用 N 个 sprite-less 红方块“❤”，飘升淡出 ──
  const HEART_MAX = 6;
  const hearts = [];
  {
    // 用两块红方块拼一个粗略心形（左右两瓣），挂在一个 Group 下，整组飘升
    for (let i = 0; i < HEART_MAX; i++) {
      const g = new THREE.Group();
      const m1 = box(0.16, 0.16, 0.05, -0.07, 0.05, 0, 0xff5a7a, false);
      const m2 = box(0.16, 0.16, 0.05,  0.07, 0.05, 0, 0xff5a7a, false);
      const m3 = box(0.18, 0.16, 0.05,  0,   -0.06, 0, 0xff5a7a, false);
      g.add(m1); g.add(m2); g.add(m3);
      g.visible = false;
      scene.add(g);
      hearts.push({ group: g, life: 0, mats: [m1.material, m2.material, m3.material] });
    }
  }
  // 让心形方块的材质可透明（mat() 缓存的 material 默认不透明，这里克隆一份独立的）
  for (const h of hearts) {
    h.mats = h.mats.map((mm) => { const c = mm.clone(); c.transparent = true; return c; });
    h.group.children.forEach((ch, idx) => { ch.material = h.mats[idx]; });
  }
  let heartCursor = 0;
  function spawnHeart(c) {
    const h = hearts[heartCursor]; heartCursor = (heartCursor + 1) % HEART_MAX;
    h.group.position.set(c.pos.x, c.pos.y + 0.9, c.pos.z);
    h.group.visible = true;
    h.life = 0.9;
    for (const mm of h.mats) mm.opacity = 1;
  }
  function updateHearts(dt) {
    for (let i = 0; i < HEART_MAX; i++) {
      const h = hearts[i];
      if (h.life <= 0) continue;
      h.life -= dt;
      if (h.life <= 0) { h.group.visible = false; continue; }
      h.group.position.y += 1.4 * dt;                 // 飘升
      const sc = 0.8 + (0.9 - h.life) * 0.6;          // 略放大
      h.group.scale.setScalar(sc);
      const op = clamp01(h.life / 0.4);
      for (const mm of h.mats) mm.opacity = op;
    }
  }

  // ── 全屏闪白 + 屏震（M3 脱链反馈）。闪白用 DOM 覆盖层；屏震偏移 canvas transform ──
  let flashTimer = 0, flashDur = 0;
  const flashEl = document.getElementById('screen-flash');
  function flashWhite(dur) { flashDur = dur; flashTimer = dur; }
  let shakeTimer = 0, shakeDur = 0, shakeMag = 0;
  function screenShake(mag, dur) { shakeMag = mag; shakeDur = dur; shakeTimer = dur; }
  function updateScreenFx(dt) {
    // 闪白淡出
    if (flashTimer > 0) {
      flashTimer = Math.max(0, flashTimer - dt);
      flashEl.style.opacity = (flashTimer / flashDur * 0.7).toFixed(3);
    } else if (flashEl.style.opacity !== '0') {
      flashEl.style.opacity = '0';
    }
    // 屏震：随机抖 canvas，衰减
    if (shakeTimer > 0) {
      shakeTimer = Math.max(0, shakeTimer - dt);
      const k = shakeTimer / shakeDur;
      const px = (Math.random() - 0.5) * shakeMag * k * 22;
      const py = (Math.random() - 0.5) * shakeMag * k * 22;
      canvas.style.transform = 'translate(' + px.toFixed(1) + 'px,' + py.toFixed(1) + 'px)';
    } else if (canvas.style.transform !== '') {
      canvas.style.transform = '';
    }
  }

  function triggerNearMiss(grazed) {
    timeScale = 0.3; timeScaleTimer = 0.2;   // 0.2s 慢动作
    sfxWhoosh();                             // 擦过呼啸（M3）
    sfxHeartbeat();                          // near-miss 心跳（规格⑧，此前定义但漏挂）
    if (grazed) grazed.staggerAnim = 0.4;    // 被擦小鸡一个趔趄（M3，syncChickList 读它做后仰摇晃）
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [Web Audio]（M3）零音频文件，全程序合成。首个用户手势后才建 AudioContext（autoplay 政策）。
  //   主线挂在 masterGain 上，🔇 静音=把 masterGain 拉 0（变量记，不存档）。
  //   音色克制：振荡器 + 短噪声 buffer（风声/扑哧）+ 包络。
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  let actx = null;
  let masterGain = null;
  let muted = false;              // 🔇 静音（变量记，不存档；刷新即恢复）
  let noiseBuffer = null;         // 白噪声 buffer（风声/扑哧/pop 共用）
  function audioInit() {
    if (!actx) {
      try {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = actx.createGain();
        masterGain.gain.value = muted ? 0 : 1;
        masterGain.connect(actx.destination);
        // 预生成 0.5s 白噪声，供风声/扑哧/pop 滤波复用
        const len = (actx.sampleRate * 0.5) | 0;
        noiseBuffer = actx.createBuffer(1, len, actx.sampleRate);
        const d = noiseBuffer.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      } catch (e) { actx = null; }
    }
    if (actx && actx.state === 'suspended') actx.resume();
  }
  function setMuted(m) {
    muted = m;
    if (masterGain) masterGain.gain.value = muted ? 0 : 1;
    const btn = document.getElementById('btn-mute');
    if (btn) btn.textContent = muted ? '🔇' : '🔊';
  }
  function toggleMute() { audioInit(); setMuted(!muted); }
  // Tab 切回后 AudioContext 可能仍是 suspended（浏览器自动挂起）；每次发声前确保已恢复。
  function ensureAudio() {
    if (actx && actx.state === 'suspended') actx.resume();
  }
  // 单振荡器音符（可选起止频率做滑音）
  function beep(freq, dur, type, gain, freqEnd) {
    if (!actx || !masterGain) return;
    ensureAudio();
    const o = actx.createOscillator(), g = actx.createGain();
    const t0 = actx.currentTime;
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, t0);
    if (freqEnd != null) o.frequency.exponentialRampToValueAtTime(Math.max(1, freqEnd), t0 + dur);
    g.gain.setValueAtTime(Math.max(0.0001, gain || 0.08), t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(masterGain);
    o.start(t0); o.stop(t0 + dur + 0.02);
  }
  // 滤波噪声爆发（风声/扑哧/pop）：type=bandpass/lowpass/highpass
  function noiseBurst(dur, gain, filterType, freq, q) {
    if (!actx || !masterGain || !noiseBuffer) return;
    ensureAudio();
    const src = actx.createBufferSource(); src.buffer = noiseBuffer;
    const flt = actx.createBiquadFilter();
    flt.type = filterType || 'bandpass'; flt.frequency.value = freq || 800; flt.Q.value = q || 1;
    const g = actx.createGain();
    const t0 = actx.currentTime;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(Math.max(0.0001, gain || 0.1), t0 + dur * 0.25);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(flt); flt.connect(g); g.connect(masterGain);
    src.start(t0); src.stop(t0 + dur + 0.02);
    return flt;   // 返回滤波器，调用方可做 frequency 扫频（俯冲风声）
  }
  // 抓到惨叫：短促像素风 squawk（快速下滑 + 一段杂噪）
  function sfxCatch() {
    beep(620, 0.1, 'square', 0.11, 240);
    setTimeout(() => beep(300, 0.12, 'sawtooth', 0.1, 140), 70);
    noiseBurst(0.12, 0.05, 'highpass', 2200, 1);
  }
  function sfxThud() { beep(90, 0.22, 'square', 0.14, 50); }              // 喜剧碰撞声（扑空）
  function sfxHeartbeat() { beep(70, 0.12, 'sine', 0.16); setTimeout(() => beep(70, 0.12, 'sine', 0.14), 140); }
  function sfxWin() { [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'triangle', 0.1), i * 110)); }
  function sfxLose() { [392, 330, 262].forEach((f, i) => setTimeout(() => beep(f, 0.25, 'triangle', 0.1), i * 150)); }
  // 老鹰俯冲风声：带通噪声 0.45s，频率从 500→1400 扫上去（呼啸感）
  function sfxDive() {
    const flt = noiseBurst(0.45, 0.09, 'bandpass', 500, 1.2);
    if (flt && actx) flt.frequency.exponentialRampToValueAtTime(1400, actx.currentTime + 0.4);
  }
  // 翅膀开合扑哧：两下低频带通噪声（扑、哧）
  function sfxFlap() {
    noiseBurst(0.1, 0.07, 'bandpass', 380, 0.8);
    setTimeout(() => noiseBurst(0.09, 0.05, 'bandpass', 300, 0.8), 90);
  }
  // 脱链 pop：短促上滑“啵”
  function sfxPop() { beep(260, 0.09, 'triangle', 0.12, 520); }
  // 重连 click：极短高频“嗒”
  function sfxClick() { beep(900, 0.05, 'square', 0.08); }
  // near-miss 擦过 whoosh：快速下滑带通噪声
  function sfxWhoosh() {
    const flt = noiseBurst(0.22, 0.08, 'bandpass', 1200, 1.5);
    if (flt && actx) flt.frequency.exponentialRampToValueAtTime(400, actx.currentTime + 0.2);
  }
  // 倒计时滴答（最后 10s 每秒一下；t<=3 时音调升高更紧张）
  function sfxTick(urgent) { beep(urgent ? 1320 : 880, 0.06, 'square', 0.07); }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [HUD 更新]：倒计时 / 抓捕数 / 技能冷却灰罩 / 状态图标
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function updateScoreHud() {
    document.getElementById('caught-num').textContent = stats.caught;
    document.getElementById('catch-goal').textContent = '/' + CFG.catchesToWin;
  }
  function updateSkillLabels() {
    const info = skillInfo();
    document.getElementById('skill-name').textContent = info.name;
    document.getElementById('skill-sub').textContent = info.sub;
    const lbl = document.getElementById('touch-skill-label');
    if (lbl) lbl.textContent = info.name.replace(/^[^一-龥]+/, '').trim() || info.name;
  }
  const timerEl = document.getElementById('timer-num');
  const skillBtnEl = document.getElementById('skill-btn');
  const skillCdEl = document.getElementById('skill-cd');
  const touchCdEl = document.getElementById('touch-cd');
  const touchSkillEl = document.getElementById('touch-skill');
  const statusEl = document.getElementById('hud-status');
  function updateHud() {
    // 倒计时
    const t = Math.max(0, Math.ceil(timeLeft));
    timerEl.textContent = '⏱ ' + t;
    timerEl.classList.toggle('urgent', t <= 10 && phase === PHASE.RUNNING);
    // 技能
    const info = skillInfo();
    document.getElementById('skill-name').textContent = info.name;
    document.getElementById('skill-sub').textContent = info.sub;
    const pct = (info.cd * 100).toFixed(0) + '%';
    skillCdEl.style.height = pct;
    skillBtnEl.classList.toggle('ready', info.ready);
    skillBtnEl.classList.toggle('active', info.active);
    // 触屏技能按钮：冷却扇形（conic-gradient 灰罩从顶部顺时针扫，cd 1→整圈）+ 状态描色
    if (touchSkillEl) {
      const deg = (info.cd * 360).toFixed(0);
      touchCdEl.style.background =
        'conic-gradient(rgba(0,0,0,0.5) 0deg, rgba(0,0,0,0.5) ' + deg + 'deg, transparent ' + deg + 'deg)';
      touchSkillEl.classList.toggle('ready', info.ready);
      touchSkillEl.classList.toggle('active', info.active);
    }
    // 状态图标（致盲 / 老鹰僵直）
    let status = '';
    if (blindTimer > 0 && playerRole === ROLE.HEN) status += '😵 老鹰被致盲 ' + blindTimer.toFixed(1) + 's　';
    if (eagle.staggerTimer > 0 && playerRole === ROLE.EAGLE) status += '💫 僵直中';
    if (status) { statusEl.textContent = status; statusEl.classList.add('show'); }
    else statusEl.classList.remove('show');
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [渲染同步 + 程序动画] 把物理状态 → Mesh，走路颠簸/摆腿、老鹰扇翅、朝向平滑
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 一只小鸡的渲染（链上/脱链共用）：走路颠簸 + 摆腿 + 蹲下压扁 + 被叼闪烁
  function syncChickList(list, dt) {
    for (const c of list) {
      const ud = c.mesh.userData;
      const speed = Math.hypot(c.vel.x, c.vel.z);
      c.bob += speed * dt * 9;
      const bobAmt = Math.min(speed / CFG.chickRunSpeed, 1) * 0.07;
      c.mesh.position.set(c.pos.x, c.pos.y + Math.abs(Math.sin(c.bob)) * bobAmt, c.pos.z);
      if (speed > 0.2) {
        const ty = Math.atan2(c.vel.x, c.vel.z);
        c.yaw = turnTowardsAngle(c.yaw, ty, 540, dt);
      }
      c.mesh.rotation.y = c.yaw;
      const legSwing = Math.sin(c.bob) * Math.min(speed / CFG.chickRunSpeed, 1) * 0.6;
      ud.legL.rotation.x = legSwing;
      ud.legR.rotation.x = -legSwing;
      // 蹲下：压扁 + 横向铺开（俯视也可读），平滑过渡
      const crouchT = c.crouchTimer > 0 ? 1 : 0;
      const cs = c.mesh.scale;
      cs.x += (lerp(1, 1.3, crouchT) - cs.x) * smoothFactor(14, dt);
      cs.y += (lerp(1, 0.4, crouchT) - cs.y) * smoothFactor(14, dt);
      cs.z += (lerp(1, 1.3, crouchT) - cs.z) * smoothFactor(14, dt);
      // near-miss 趔趄：被擦后短暂后仰 + 左右晃（M3，纯视觉，叠在 rotation 上）
      if (c.staggerAnim > 0) {
        c.staggerAnim = Math.max(0, c.staggerAnim - dt);
        const k = c.staggerAnim / 0.4;                 // 1→0
        c.mesh.rotation.x = Math.sin(c.staggerAnim * 38) * 0.5 * k;   // 后仰晃
        c.mesh.rotation.z = Math.cos(c.staggerAnim * 30) * 0.35 * k;  // 侧晃
      } else if (c.mesh.rotation.x !== 0 || c.mesh.rotation.z !== 0) {
        c.mesh.rotation.x = 0; c.mesh.rotation.z = 0;  // 复位（趔趄结束）
      }
    }
  }

  function syncVisuals(dt) {
    // ── 母鸡 ──
    {
      const ud = hen.mesh.userData;
      const speed = Math.hypot(hen.vel.x, hen.vel.z);
      hen.bob += speed * dt * 6;
      const bobAmt = Math.min(speed / CFG.henSpeed, 1) * 0.08;
      hen.mesh.position.set(hen.pos.x, hen.pos.y + Math.abs(Math.sin(hen.bob)) * bobAmt, hen.pos.z);
      hen.mesh.rotation.y = hen.yaw;
      // 摆腿（幅度随速度）
      const legSwing = Math.sin(hen.bob) * Math.min(speed / CFG.henSpeed, 1) * 0.5;
      ud.legL.rotation.x = legSwing;
      ud.legR.rotation.x = -legSwing;
      // 轻微身体摇摆（踉跄时大幅后仰）
      hen.mesh.rotation.z = Math.sin(hen.bob) * 0.02 * Math.min(speed / CFG.henSpeed, 1);
      hen.mesh.rotation.x = hen.staggerTimer > 0 ? -0.3 : 0;

      // ── 翅膀开合动画（HenWings.cs）：wingT 0→1，肩 pivot 绕 y 从 ±70°(收) → 0°(开横展)，翅板长度随 span ──
      // wingOpen 翻转瞬间播扑哧（M3，玩家/AI 共用，仅 RUNNING）
      if (hen.wingOpen !== hen._lastWingOpen) {
        if (phase === PHASE.RUNNING) sfxFlap();
        hen._lastWingOpen = hen.wingOpen;
      }
      const target = hen.wingOpen ? 1 : 0;
      const animSpeed = CFG.henWingAnimTime > 0 ? dt / CFG.henWingAnimTime : 1;
      hen.wingT = moveTowardsScalar(hen.wingT, target, animSpeed);
      const span = lerp(CFG.henWingClosedSpan, CFG.henWingWidth, hen.wingT);
      hen.wingSpan = span;   // 碰撞解算读这个
      const halfSpan = span * 0.5;
      const wingLen = Math.max(0.3, halfSpan - 0.5);   // 肩在 ±0.5
      const ang = lerp(70 * Math.PI / 180, 0, hen.wingT);   // 收 70° → 开 0°
      ud.wingL.rotation.y = ang; ud.wingR.rotation.y = -ang;
      // 翅板长度：scale.x = wingLen，中心移到肩外 halfLen
      const halfLen = wingLen * 0.5;
      ud.wingPlateL.scale.x = wingLen; ud.wingPlateL.position.x = -halfLen;
      ud.wingPlateR.scale.x = wingLen; ud.wingPlateR.position.x = halfLen;
    }
    // ── 小鸡（链上 + 脱链统一渲染）──
    syncChickList(chicks, dt);
    syncChickList(detached, dt);
    // ── 老鹰 ──
    {
      const ud = eagle.mesh.userData;
      eagle.wingPhase += dt * 11; // 持续扇动
      eagle.mesh.position.set(eagle.pos.x, eagle.pos.y, eagle.pos.z);
      const flap = Math.sin(eagle.wingPhase) * 0.6;
      ud.wingL.rotation.z = flap;
      ud.wingR.rotation.z = -flap;
      // 姿态：蓄力低头 / 俯冲下压 / 扑空翻滚 / 僵直后仰
      let pitchTarget = 0, rollTarget = 0;
      if (eagle.rollTimer > 0) {
        // 扑空翻滚：绕侧轴翻一圈（调研指令 #5/#12）
        rollTarget = (1 - eagle.rollTimer / 0.8) * Math.PI * 2;
        eagle.mesh.rotation.y = eagle.yaw;
        eagle.mesh.rotation.x = rollTarget;
      } else if (eagle.dashCharge > 0) {
        pitchTarget = 0.5;   // 蓄力低头（前摇可视窗口）
        eagle.mesh.rotation.y = eagle.yaw;
        eagle.mesh.rotation.x += (pitchTarget - eagle.mesh.rotation.x) * smoothFactor(14, dt);
      } else if (eagle.staggerTimer > 0) {
        pitchTarget = -0.4;  // 弹开后仰
        eagle.mesh.rotation.y = eagle.yaw;
        eagle.mesh.rotation.x += (pitchTarget - eagle.mesh.rotation.x) * smoothFactor(10, dt);
      } else {
        pitchTarget = (eagle.dashTimer > 0) ? 0.35 : 0;
        eagle.mesh.rotation.y = eagle.yaw;
        eagle.mesh.rotation.x += (pitchTarget - eagle.mesh.rotation.x) * smoothFactor(8, dt);
      }
      // 蓄力期间红色描边提示（调研指令 #1：给母鸡反应窗口）——用 body 染红近似 outline
      const charging = eagle.dashCharge > 0;
      if (charging && !eagle._chargeTint) { ud.body.material = mat(0xc0392b); eagle._chargeTint = true; }
      else if (!charging && eagle._chargeTint) { ud.body.material = mat(0x5a3d22); eagle._chargeTint = false; }
    }
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [相机系统] follow（第三人称跟背）/ fps（第一人称）/ top（M1 动态取景，原样保留）
  // 三种模式各算出"目标相机位姿（位置 + 注视点）"；切换时用 0.4s 过渡平滑插值，不瞬移。
  // 所有平滑都吃真实帧 dt（updateCamera 的入参 = frameDt）。
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  // ---- top 模式状态（M1 动态取景，逻辑一字未改，仅搬进 computeTopPose） ----
  const camFocus = new THREE.Vector3(0, 0, 0);  // 平滑后的注视点
  let camDist = 34;                              // 平滑后的距离
  const CAM_PITCH = 45 * Math.PI / 180;          // 俯角 45°
  const CAM_YAW = 0;                             // 从场地南侧看（沿 +Z 看向 -Z）

  // 一个"相机位姿"目标：位置 outPos + 注视点 outLook（每模式各自填充）
  const _camPos = new THREE.Vector3();
  const _camLook = new THREE.Vector3();
  const _followPos = new THREE.Vector3();   // follow 平滑后的相机位置
  let followInit = false;

  // 过渡用：起点位姿快照 + 计时
  const _transFromPos = new THREE.Vector3();
  const _transFromQuat = new THREE.Quaternion();
  const _scratchQuat = new THREE.Quaternion();
  const _scratchObj = new THREE.Object3D();  // 借它把 (pos,look) 转成四元数
  let transT = 0;                            // 过渡剩余时间（秒）
  let transFov = 60;                         // 过渡起点 FOV

  // ── top 模式：原 M1 动态取景，逐字保留 ──
  function computeTopPose(dt, outPos, outLook) {
    let minX = hen.pos.x, maxX = hen.pos.x, minZ = hen.pos.z, maxZ = hen.pos.z;
    function extend(p) {
      if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
      if (p.z < minZ) minZ = p.z; if (p.z > maxZ) maxZ = p.z;
    }
    for (const c of chicks) extend(c.pos);
    extend(eagle.pos);
    const cx = (minX + maxX) / 2, cz = (minZ + maxZ) / 2;
    const sizeX = (maxX - minX), sizeZ = (maxZ - minZ);

    const margin = 1.3;
    const fovV = camera.fov * Math.PI / 180;
    const fovH = 2 * Math.atan(Math.tan(fovV / 2) * camera.aspect);
    const distForX = (sizeX * margin * 0.5) / Math.tan(fovH / 2);
    const distForZ = (sizeZ * margin * 0.5) / (Math.tan(fovV / 2) * Math.sin(CAM_PITCH));
    let wantDist = Math.max(distForX, distForZ, 16);
    wantDist = clamp(wantDist, 16, 80);

    const k = smoothFactor(3, dt);
    camFocus.x += (cx - camFocus.x) * k;
    camFocus.z += (cz - camFocus.z) * k;
    camFocus.y += (0.6 - camFocus.y) * k;
    camDist += (wantDist - camDist) * k;

    const horiz = Math.cos(CAM_PITCH) * camDist;
    const vert = Math.sin(CAM_PITCH) * camDist;
    outPos.set(
      camFocus.x + Math.sin(CAM_YAW) * horiz,
      camFocus.y + vert,
      camFocus.z + Math.cos(CAM_YAW) * horiz
    );
    outLook.set(camFocus.x, camFocus.y, camFocus.z);
  }

  // ── follow 模式：相机在角色身后 dist=8、高 4.2，松松地追角色 yaw（指数平滑）──
  function computeFollowPose(dt, outPos, outLook) {
    const a = controlled;
    // camYaw 指数平滑追角色 yaw（最短弧）。"松松地跟"=急转时慢半拍甩过来。
    {
      let diff = a.yaw - camYaw;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      camYaw += diff * smoothFactor(FOLLOW.yawRate, dt);
    }
    // 由 camYaw 反推"身后"方向：角色 forward=(sin,cos)，身后 = -forward。
    const fx = Math.sin(camYaw), fz = Math.cos(camYaw);
    // 目标相机位置 = 角色位置 - forward*dist + 上方 height
    const targetX = a.pos.x - fx * FOLLOW.dist;
    const targetZ = a.pos.z - fz * FOLLOW.dist;
    const targetY = a.pos.y + FOLLOW.height;
    // 位置指数平滑（同样松松地跟）
    if (!followInit) { _followPos.set(targetX, targetY, targetZ); followInit = true; }
    else {
      const kp = smoothFactor(FOLLOW.posRate, dt);
      _followPos.x += (targetX - _followPos.x) * kp;
      _followPos.y += (targetY - _followPos.y) * kp;
      _followPos.z += (targetZ - _followPos.z) * kp;
    }
    outPos.copy(_followPos);
    // lookAt 角色位置 + 抬 1.2m + 略向前 1m（用 camYaw 朝向，避免与相机 yaw 抖动打架）
    outLook.set(
      a.pos.x + fx * FOLLOW.lookAhead,
      a.pos.y + FOLLOW.lookHeight,
      a.pos.z + fz * FOLLOW.lookAhead
    );
  }

  // ── fps 模式：相机绑角色头部，看向 forward 俯 5°，移动时轻微 bob ──
  let fpsBobPhase = 0;
  function computeFpsPose(dt, outPos, outLook) {
    const a = controlled;
    const eye = eyeHeightOf(a);
    // 移动 bob：受控角色水平速度越大幅度越大
    const sp = Math.hypot(a.vel.x, a.vel.z);
    fpsBobPhase += sp * dt * FPS.bobRate;
    const bob = Math.abs(Math.sin(fpsBobPhase)) * Math.min(sp / CFG.henSpeed, 1) * FPS.bobAmp;
    outPos.set(a.pos.x, a.pos.y + eye + bob, a.pos.z);
    // 看向 forward 并俯 5°：在前方取一点，y 比眼略低（tan(5°)·1m）
    const fx = Math.sin(a.yaw), fz = Math.cos(a.yaw);
    outLook.set(
      outPos.x + fx,
      outPos.y - Math.tan(FPS.pitchDown),
      outPos.z + fz
    );
  }

  // 期望 FOV（follow=60 / fps=70 / top=沿用 55 不动镜头算式）
  // 移动端 follow 收窄到 45° 补偿小屏信息密度（调研指令 #13）
  function desiredFov() {
    if (camMode === 'follow') return IS_TOUCH ? 45 : FOLLOW.fov;
    if (camMode === 'fps') return FPS.fov;
    return 55;
  }

  function updateCamera(dt) {
    // 1) 算当前模式的目标位姿
    if (camMode === 'follow') computeFollowPose(dt, _camPos, _camLook);
    else if (camMode === 'fps') computeFpsPose(dt, _camPos, _camLook);
    else computeTopPose(dt, _camPos, _camLook);

    const fovTarget = desiredFov();

    if (transT > 0) {
      // 2) 过渡中：从快照位姿向目标位姿插值（位置 lerp，朝向 slerp，FOV lerp）
      transT = Math.max(0, transT - dt);
      const u = 1 - transT / CAM_TRANSITION;           // 0→1
      const e = u * u * (3 - 2 * u);                    // smoothstep
      // 目标朝向四元数：用 scratchObj 摆到目标位姿再 lookAt
      _scratchObj.position.copy(_camPos);
      _scratchObj.up.set(0, 1, 0);
      _scratchObj.lookAt(_camLook);
      _scratchQuat.copy(_scratchObj.quaternion);
      camera.position.lerpVectors(_transFromPos, _camPos, e);
      camera.quaternion.slerpQuaternions(_transFromQuat, _scratchQuat, e);
      camera.fov = transFov + (fovTarget - transFov) * e;
      camera.updateProjectionMatrix();
    } else {
      // 3) 稳态：直接对准
      camera.position.copy(_camPos);
      camera.up.set(0, 1, 0);
      camera.lookAt(_camLook);
      if (Math.abs(camera.fov - fovTarget) > 0.01) {
        camera.fov = fovTarget;
        camera.updateProjectionMatrix();
      }
    }

    // 太阳目标 + 阴影框跟随受控角色（保证阴影在视野内；top 维持原行为也成立）
    const sx = camMode === 'top' ? camFocus.x : controlled.pos.x;
    const sz = camMode === 'top' ? camFocus.z : controlled.pos.z;
    sun.target.position.set(sx, 0, sz);
    sun.position.set(sx + 28, 46, sz + 20);

    // 4) 屏幕边缘威胁指示（follow/fps）
    updateThreatArrow(dt);
  }

  // 切换视角：快照当前位姿做 0.4s 过渡起点，循环 follow→fps→top，更新 HUD 与 mesh 可见性
  function cycleCamMode() {
    const i = CAM_MODES.indexOf(camMode);
    setCamMode(CAM_MODES[(i + 1) % CAM_MODES.length]);
  }
  function setCamMode(next) {
    if (next === camMode) return;
    // 快照当前真实相机位姿作为过渡起点
    _transFromPos.copy(camera.position);
    _transFromQuat.copy(camera.quaternion);
    transFov = camera.fov;
    transT = CAM_TRANSITION;
    // 离开 fps：恢复上一个受控角色 mesh 可见
    if (camMode === 'fps') controlled.mesh.visible = true;
    camMode = next;
    // 进入 follow：camYaw 从当前角色 yaw 起步，位置平滑器重置到目标，避免开场猛甩
    if (next === 'follow') { camYaw = controlled.yaw; followInit = false; }
    // 进入 fps：隐藏受控角色自身 mesh（看不到自己脑袋）
    if (next === 'fps') controlled.mesh.visible = false;
    // HUD 文字
    const el = document.getElementById('cam-mode');
    if (el) el.textContent = CAM_MODE_LABEL[next];
  }

  // ── 屏幕边缘威胁指示：老鹰在视野外时屏幕边缘画红 ▲ 指向它（top 不显示）──
  const _threatProj = new THREE.Vector3();
  const threatArrowEl = document.getElementById('threat-arrow');
  let threatOpacity = 0;
  function updateThreatArrow(dt) {
    if (camMode === 'top' || phase !== PHASE.RUNNING) {
      threatOpacity += (0 - threatOpacity) * smoothFactor(8, dt);
      threatArrowEl.style.opacity = threatOpacity.toFixed(3);
      return;
    }
    // 威胁箭头目标按角色：鸡方→指老鹰；老鹰→指队尾(或最近脱链)小鸡
    let tx, ty, tz;
    if (playerRole === ROLE.EAGLE) {
      const t = eagleTarget();
      if (t) { tx = t.pos.x; ty = t.pos.y + 0.3; tz = t.pos.z; }
      else { threatOpacity += (0 - threatOpacity) * smoothFactor(8, dt); threatArrowEl.style.opacity = threatOpacity.toFixed(3); return; }
    } else {
      tx = eagle.pos.x; ty = eagle.pos.y + 0.3; tz = eagle.pos.z;
    }
    _threatProj.set(tx, ty, tz).project(camera);
    const behind = _threatProj.z > 1;                       // 在相机后方（裁剪面外）
    const outX = _threatProj.x < -1 || _threatProj.x > 1;
    const outY = _threatProj.y < -1 || _threatProj.y > 1;
    const offscreen = behind || outX || outY;

    let targetOp = 0;
    if (offscreen) {
      targetOp = 1;
      const W = window.innerWidth, H = window.innerHeight;
      // 方向：从屏幕中心指向老鹰的屏幕方位。后方时把方向翻转（投影会镜像）。
      let nx = _threatProj.x, ny = _threatProj.y;
      if (behind) { nx = -nx; ny = -ny; }
      let ang = Math.atan2(ny, nx);   // 屏幕坐标系（y 向上）下的角度
      // 钳到屏幕边框内一圈（留 28px 边距），把方向射线打到矩形边界
      const mgn = 30;
      const halfW = W / 2 - mgn, halfH = H / 2 - mgn;
      const cosA = Math.cos(ang), sinA = Math.sin(ang);
      // 射线与矩形求交，取较小 t
      let t = Infinity;
      if (Math.abs(cosA) > 1e-4) t = Math.min(t, halfW / Math.abs(cosA));
      if (Math.abs(sinA) > 1e-4) t = Math.min(t, halfH / Math.abs(sinA));
      const px = W / 2 + cosA * t;
      const py = H / 2 - sinA * t;   // 屏幕 y 向下，取负
      // ▲ 默认尖朝上(border-bottom)，旋转使尖端指向老鹰方位：
      // 三角默认指向屏幕上方(-y)=数学 90°，需旋转 (-ang - 90°)（CSS 顺时针为正）
      const deg = (-ang * 180 / Math.PI) - 90;
      threatArrowEl.style.left = (px - 13) + 'px';   // 减去半宽(13)居中
      threatArrowEl.style.top  = (py - 11) + 'px';   // 减去半高(~11)
      threatArrowEl.style.transform = 'rotate(' + deg.toFixed(1) + 'deg)';
    }
    threatOpacity += (targetOp - threatOpacity) * smoothFactor(8, dt);
    threatArrowEl.style.opacity = threatOpacity.toFixed(3);
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [固定步长主循环] 累加器 60Hz，frameDt 钳制 ≤0.1s 防螺旋死亡
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  let lastTime = performance.now();
  let accumulator = 0;

  function loop(now) {
    requestAnimationFrame(loop);
    let frameDt = (now - lastTime) / 1000;
    lastTime = now;
    if (frameDt > MAX_FRAME_DT) frameDt = MAX_FRAME_DT; // 防螺旋死亡

    // near-miss 慢动作：物理推进乘 timeScale（调研指令 #2），渲染/相机仍用真实 dt
    if (timeScaleTimer > 0) { timeScaleTimer -= frameDt; if (timeScaleTimer <= 0) timeScale = 1; }
    accumulator += frameDt * timeScale;

    // 固定步长推进物理（仅 RUNNING 阶段；READY/SELECT/SETTLE 全冻结）
    while (accumulator >= FIXED_DT) {
      if (phase === PHASE.RUNNING) {
        // 玩家小鸡：把输入写进 playerSteer（链行为层按 chickSteerWeight 混入）
        if (playerRole === ROLE.CHICK && controlledChick) {
          readInput(inputDir, FIXED_DT);
          controlledChick.playerSteer.copy(inputDir);
        }
        eagleStep(FIXED_DT);       // 先推老鹰（含翅膀墙解算 + 抓捕判定）
        physicsStep(FIXED_DT);     // 母鸡 + 链条 PBD
        detachedStep(FIXED_DT);    // 脱链小鸡回家
        chickTimersStep(FIXED_DT); // 链上小鸡计时 + 自动蹲下
        if (blindTimer > 0) blindTimer -= FIXED_DT;
        // 倒计时
        timeLeft -= FIXED_DT;
        // 最后 10s 滴答：每跨过一个整秒触发一次（t<=3 更急促，M3）
        const sec = Math.ceil(timeLeft);
        if (sec <= 10 && sec >= 1 && sec !== lastTickSec) { lastTickSec = sec; sfxTick(sec <= 3); }
        if (timeLeft <= 0) { timeLeft = 0; endRound('flock'); }   // 撑满 90s 鸡队赢
      }
      accumulator -= FIXED_DT;
    }

    // 渲染同步用真实帧 dt（动画/相机平滑帧率无关）
    updateStars(frameDt);
    updateFeathers(frameDt);   // 方块羽毛（M3）
    updateHearts(frameDt);     // 头顶 ❤（M3）
    updateScreenFx(frameDt);   // 闪白 + 屏震（M3）
    syncVisuals(frameDt);
    updateCamera(frameDt);
    updateHud();
    renderer.render(scene, camera);
  }

  // 初次把 Mesh 摆到位（冻结时也要显示）
  function initialSync() {
    hen.mesh.position.set(hen.pos.x, hen.pos.y, hen.pos.z);
    hen.mesh.rotation.y = hen.yaw;
    for (const c of chicks) { c.mesh.position.set(c.pos.x, c.pos.y, c.pos.z); c.mesh.rotation.y = c.yaw; }
    eagle.mesh.position.set(eagle.pos.x, eagle.pos.y, eagle.pos.z);
    eagle.mesh.rotation.y = eagle.yaw;
    // 相机先对准一次
    updateCamera(1.0);
  }
  initialSync();
  requestAnimationFrame(loop);

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [UI] Toast / 响应式 resize / 调参面板
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // 响应式
  function onResize() {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  }
  window.addEventListener('resize', onResize);
  onResize();

  // ---- 调参面板 ----
  // 每条：key / 标签 / min / max / step
  const PANEL_SPECS = [
    ['henSpeed',        '母鸡速度 henSpeed',         3,    10,    0.1],
    ['henTurnSpeed',    '母鸡转速 henTurnSpeed',     120,  480,   5],
    ['henAggression',   '母鸡侵略 henAggression',    0,    1,     0.05],
    ['chickRunSpeed',   '小鸡速度 chickRunSpeed',    4,    14,    0.1],
    ['chickRunAccel',   '小鸡加速 chickRunAccel',    10,   80,    1],
    ['chainDamping',    '子步阻尼 chainDamping(每子步)', 0.90, 0.995, 0.001],
    ['tailSpeedAmplify','尾端放大 tailSpeedAmplify', 0,    0.8,   0.01],
    ['chickSpacing',    '链节间距 chickSpacing',     0.5,  1.5,   0.01],
    ['overloadStretch', '脱手拉伸 overloadStretch',  1.2,  2.5,   0.05],
    ['dashCooldown',    '扑击冷却 dashCooldown',     1.0,  4.0,   0.1],
  ];

  function buildPanel() {
    const wrap = document.getElementById('panel-rows');
    wrap.innerHTML = '';
    for (const [key, label, min, max, step] of PANEL_SPECS) {
      const row = document.createElement('div');
      row.className = 'row';
      const id = 'rng-' + key;
      row.innerHTML =
        '<label><span>' + label + '</span><span class="val" id="val-' + key + '">' + fmt(CFG[key], step) + '</span></label>' +
        '<input type="range" id="' + id + '" min="' + min + '" max="' + max + '" step="' + step + '" value="' + CFG[key] + '">';
      wrap.appendChild(row);
      const input = row.querySelector('input');
      input.addEventListener('input', () => {
        CFG[key] = parseFloat(input.value);
        document.getElementById('val-' + key).textContent = fmt(CFG[key], step);
        // chickSpacing 改变会让链条重排，但保留现状（实时拉伸，符合"实时生效"）
      });
    }
  }
  function fmt(v, step) {
    // 按步长决定小数位
    if (step >= 1) return v.toFixed(0);
    if (step >= 0.1) return v.toFixed(1);
    if (step >= 0.01) return v.toFixed(2);
    return v.toFixed(3);
  }
  function syncPanelInputs() {
    for (const [key, , , , step] of PANEL_SPECS) {
      const input = document.getElementById('rng-' + key);
      if (input) { input.value = CFG[key]; document.getElementById('val-' + key).textContent = fmt(CFG[key], step); }
    }
  }
  function togglePanel() {
    panelOpen = !panelOpen;
    document.getElementById('panel').classList.toggle('open', panelOpen);
  }
  document.getElementById('panel-close').addEventListener('click', togglePanel);
  document.getElementById('hud-hint').addEventListener('click', togglePanel); // 触屏也能开
  document.getElementById('panel-reset').addEventListener('click', () => {
    for (const [key] of PANEL_SPECS) CFG[key] = DEFAULTS[key];
    syncPanelInputs();
    showToast('↺ 已恢复默认参数');
  });
  buildPanel();

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [选角卡片 / 结算按钮 接线]
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  document.querySelectorAll('.role-card').forEach((card) => {
    card.addEventListener('click', () => { if (phase === PHASE.ROLE_SELECT) selectRole(parseInt(card.dataset.role, 10)); });
  });
  document.getElementById('btn-again').addEventListener('click', restartSameRole);
  document.getElementById('btn-changerole').addEventListener('click', backToRoleSelect);

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [开局教学提示]（M3）：beginRound 调用，按受控角色显示一行操作提示，5s 自动淡出。
  //   触屏/键盘文案不同（摇杆 vs WASD）。淡出靠 CSS transition + setTimeout。
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  let tutorialTimer = null;
  function showTutorial() {
    const el = document.getElementById('tutorial');
    const move = IS_TOUCH ? '左摇杆移动' : 'WASD/方向键移动';
    const skill = IS_TOUCH ? '右下大按钮' : '空格';
    const lines = {
      0: '🦅 你是老鹰：' + move + '，' + skill + ' 蓄力俯冲叼小鸡（撞翅膀会被弹开）',
      1: '🐔 你是母鸡：' + move + ' 卡住老鹰，' + skill + ' 张翅当墙（变宽变慢）护住小鸡',
      2: '🐤 你是队尾小鸡：' + move + ' 跟紧队伍，' + skill + ' 紧急蹲下躲俯冲',
    };
    el.textContent = lines[playerRole] || '';
    el.classList.add('show');
    if (tutorialTimer) clearTimeout(tutorialTimer);
    tutorialTimer = setTimeout(() => el.classList.remove('show'), 5000);
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [移动端：动态原点左摇杆 + 右下技能 + 右上 视角/静音]（M3，调研指令 #13）
  //   左半屏任意处按下 → 摇杆原点落在触点，拖动产出归一化向量喂 readInput；
  //   右下技能大按钮（≥64px，updateHud 画冷却扇形）；右上 📷 切视角 / 🔇 静音。
  //   touch-action:none（CSS）防滚动缩放；只有触屏才挂 .on / .touch。
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  let touchMove = { x: 0, y: 0 };   // 左摇杆归一化 [-1,1]（readInput 读它）
  if (IS_TOUCH) {
    document.body.classList.add('touch');
    document.getElementById('touch-ui').classList.add('on');
    setupDynamicStick();
    // 技能大按钮
    const tb = document.getElementById('touch-skill');
    const fireSkill = (e) => {
      e.preventDefault();
      audioInit();
      if (phase === PHASE.READY) { beginRound(); return; }
      if (phase === PHASE.RUNNING) triggerSkill();
    };
    tb.addEventListener('touchstart', fireSkill, { passive: false });
    tb.addEventListener('mousedown', fireSkill);
    // 右上：视角切换 / 静音
    const camBtn = document.getElementById('btn-cam');
    const tapCam = (e) => { e.preventDefault(); audioInit(); cycleCamMode(); };
    camBtn.addEventListener('touchstart', tapCam, { passive: false });
    camBtn.addEventListener('mousedown', tapCam);
    const muteBtn = document.getElementById('btn-mute');
    const tapMute = (e) => { e.preventDefault(); toggleMute(); };
    muteBtn.addEventListener('touchstart', tapMute, { passive: false });
    muteBtn.addEventListener('mousedown', tapMute);
  }

  // 动态原点左摇杆：监听左半屏按下，摇杆生成在触点处。半径 R 内归一化。
  function setupDynamicStick() {
    const stick = document.getElementById('stick-move');
    const knob = document.getElementById('knob-move');
    const R = 56;                       // 摇杆有效半径（px）
    let active = false, id = null, ox = 0, oy = 0;   // ox/oy=原点屏幕坐标
    function isLeftHalf(x) { return x < window.innerWidth * 0.5; }
    function place(x, y) {
      ox = x; oy = y;
      stick.style.left = x + 'px'; stick.style.top = y + 'px';
      stick.classList.add('show');
      knob.style.left = '50%'; knob.style.top = '50%';
    }
    function start(e) {
      // 仅游戏中 / 待机时接管（选角与结算阶段交给覆盖层的卡片/按钮）
      if (phase !== PHASE.RUNNING && phase !== PHASE.READY) return;
      // 只接管左半屏的触点（右半屏留给技能/相机按钮）
      const t = e.changedTouches ? e.changedTouches[0] : e;
      if (!isLeftHalf(t.clientX)) return;
      if (active) return;                // 已有手指占用左摇杆
      active = true; id = e.changedTouches ? t.identifier : 'mouse';
      audioInit();
      if (phase === PHASE.READY) beginRound();   // 摸一下就开局
      place(t.clientX, t.clientY);
      e.preventDefault();
    }
    function findTouch(e) {
      if (!e.changedTouches) return e;
      for (const ct of e.changedTouches) if (ct.identifier === id) return ct;
      return null;
    }
    function move(e) {
      if (!active) return;
      const t = findTouch(e); if (!t) return;
      let dx = t.clientX - ox, dy = t.clientY - oy;
      const d = Math.hypot(dx, dy);
      if (d > R) { dx = dx / d * R; dy = dy / d * R; }
      // knob 中心相对底盘中心偏移 dx px；底盘 132px 宽 → 百分比 = 50 + dx/132*100
      const base = stick.clientWidth || 132;
      knob.style.left = (50 + dx / base * 100) + '%';
      knob.style.top  = (50 + dy / base * 100) + '%';
      touchMove.x = dx / R; touchMove.y = dy / R;
      e.preventDefault();
    }
    function end(e) {
      if (!active) return;
      // 多指时只在自己那根手指抬起才结束
      if (e.changedTouches) { const t = findTouch(e); if (!t) return; }
      active = false; id = null;
      touchMove.x = 0; touchMove.y = 0;
      stick.classList.remove('show');
    }
    // 监听整窗，由 isLeftHalf 过滤；右下技能/右上按钮 fireSkill 里已 preventDefault 且区域不重叠。
    window.addEventListener('touchstart', start, { passive: false });
    window.addEventListener('touchmove', move, { passive: false });
    window.addEventListener('touchend', end);
    window.addEventListener('touchcancel', end);
    // 桌面鼠标也支持（便于不带触屏的开发机验证）
    window.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
  }

  </script>
